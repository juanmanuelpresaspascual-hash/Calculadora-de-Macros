          <div className="mono" style={{fontSize:12,marginTop:8,padding:'8px 12px',borderRadius:5,background:'rgba(91,107,58,.08)',color:'var(--accent2)'}}>
            {(()=>{const raw=parseFloat(amt.replace(',','.'))||0;let eq=null;if(canSwitch&&raw>0)eq=mode==='units'?`= ${n(raw*food.weightPerUnit,1)}g`:`= ${n(raw/food.weightPerUnit,2)}u`;return<>{eq&&<span style={{color:'var(--muted)',marginRight:8}}>{eq} ·</span>}{ni(mm.cal)} kcal · P {n(mm.protein,1)} · C {n(mm.carbs,1)} · G {n(mm.fat,1)}</>;})()}

  );
}

/* ── FOOD FORM MODAL ── */
function FoodFormModal({food,onClose,onSave}){
  const ed=!!food;
  const[name,setName]=useState(food?.name||'');
  const[basis,setBasis]=useState(food?.basis||'per_100g');
  const[cal,setCal]=useState(food?String(food.cal):'');
  const[protein,setProtein]=useState(food?String(food.protein):'');
  const[carbs,setCarbs]=useState(food?String(food.carbs):'');
  const[fat,setFat]=useState(food?String(food.fat):'');
  const[fiber,setFiber]=useState(food?String(food.fiber):'0');
  const[notes,setNotes]=useState(food?.notes||'');
  const[wpu,setWpu]=useState(food?.weightPerUnit?String(food.weightPerUnit):'');
  const[rc,setRc]=useState(food?.rawCooked||null);
  const[perPortion,setPerPortion]=useState(false);
  const[portionG,setPortionG]=useState('');
  const[pasteText,setPasteText]=useState('');
  const[pasteMsg,setPasteMsg]=useState(null);

  const tryPaste=()=>{
    const r=parseLabelText(pasteText);
    if(!r){setPasteMsg({ok:false,msg:'No se detectó nada.'});return;}
    let sf=1;if(r.scaledFrom)sf=100/r.scaledFrom;
    const set=(v,s)=>{if(v!=null&&!isNaN(v))s(String(+(v*sf).toFixed(2)));};
    set(r.cal,setCal);set(r.protein,setProtein);set(r.carbs,setCarbs);set(r.fat,setFat);set(r.fiber,setFiber);
    setBasis('per_100g');
    setPasteMsg({ok:true,msg:r.scaledFrom?`Escalado desde porción de ${r.scaledFrom}g.`:'Detectado — revisá los valores.'});
  };
  const submit=()=>{
    if(!name.trim())return;
    let pC=parseFloat((cal||'').replace(',','.')),pPr=parseFloat((protein||'').replace(',','.')),pCa=parseFloat((carbs||'').replace(',','.')),pF=parseFloat((fat||'').replace(',','.')),pFi=parseFloat((fiber||'0').replace(',','.'));
    if(perPortion&&basis!=='per_unit'){const pg=parseFloat((portionG||'').replace(',','.'));if(pg>0){const f=100/pg;pC*=f;pPr*=f;pCa*=f;pF*=f;pFi*=f;}}
    onSave({id:food?.id||uid(),name:name.trim(),basis,cal:isNaN(pC)?0:pC,protein:isNaN(pPr)?0:pPr,carbs:isNaN(pCa)?0:pCa,fat:isNaN(pF)?0:pF,fiber:isNaN(pFi)?0:pFi,notes:notes.trim(),weightPerUnit:basis==='per_unit'?(parseFloat(wpu.replace(',','.'))||null):null,rawCooked:rc,createdAt:food?.createdAt||Date.now(),updatedAt:Date.now()});
  };
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="display" style={{fontSize:17,fontWeight:600}}>{ed?'Editar alimento':'Nuevo alimento'}</div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:12}}>
          <div><label style={{fontSize:12,color:'var(--muted)'}}>Nombre</label><input style={{marginTop:4}} value={name} onChange={e=>setName(e.target.value)} placeholder="ej. Yogur griego natural" autoFocus/></div>
          <div>
            <label style={{fontSize:12,color:'var(--muted)'}}>Base</label>
            <div style={{display:'flex',gap:4,marginTop:4}}>
              {['per_100g','per_100ml','per_unit'].map(b=><button key={b} type="button" className={`btn btn-sm${basis===b?' btn-primary':''}`} style={{flex:1,fontSize:12}} onClick={()=>setBasis(b)}>{BL[b]}</button>)}
            </div>
            {basis==='per_unit'&&(
              <div style={{marginTop:8}}>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Ingresá los macros de <strong>1 unidad</strong>.</div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <input type="text" className="mono" style={{width:90}} placeholder="ej. 60" value={wpu} onChange={e=>setWpu(e.target.value)}/>
                  <span style={{fontSize:12,color:'var(--muted)'}}>g por unidad (opcional — permite cargar también en gramos)</span>
                </div>
              </div>
            )}
          </div>
          <div>
            <label style={{fontSize:12,color:'var(--muted)'}}>Crudo / cocido (informativo)</label>
            <div style={{display:'flex',gap:4,marginTop:4}}>
              {[null,'crudo','cocido'].map(v=><button key={String(v)} type="button" className={`btn btn-sm${rc===v?' btn-primary':''}`} onClick={()=>setRc(v)}>{v||'N/A'}</button>)}
            </div>
          </div>
          {/* Paste label */}
          <div style={{background:'rgba(91,107,58,.07)',border:'1px solid rgba(91,107,58,.22)',borderRadius:6,padding:12}}>
            <div style={{fontSize:12,fontWeight:500,color:'var(--accent2)',marginBottom:6,display:'flex',alignItems:'center',gap:5}}><ISparkle s={12}/>Pegar etiqueta nutricional</div>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:6}}>Copiá el texto del paquete y pegalo acá.</div>
            <textarea rows={4} className="mono" style={{fontSize:11,resize:'vertical'}} placeholder={'Valor energético 380 kcal\nProteínas 8g\nCarbohidratos 65g\nGrasas totales 10g\nFibra 3g'} value={pasteText} onChange={e=>{setPasteText(e.target.value);setPasteMsg(null);}}/>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}>
              <button type="button" className="btn btn-primary btn-xs" onClick={tryPaste} disabled={!pasteText.trim()}>Detectar valores</button>

          </div>

          <button className="btn btn-primary" onClick={submit} disabled={!name.trim()}>{ed?'Guardar':'Crear'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── COMBO FORM MODAL ── */
function ComboFormModal({combo,foods,onClose,onSave}){
  const ed=!!combo;
  const[name,setName]=useState(combo?.name||'');
  const[items,setItems]=useState(combo?.items||[]);
  const[adding,setAdding]=useState(false);
  const[q,setQ]=useState('');
  const[pf,setPf]=useState(null);
  const[pa,setPa]=useState('');
  const foodsArr=useMemo(()=>Object.values(foods).sort((a,b)=>a.name.localeCompare(b.name,'es')),[foods]);
  const filtered=useMemo(()=>q.trim()?foodsArr.filter(f=>fuzzy(q,f.name)>0):foodsArr,[foodsArr,q]);
  const mm=useMemo(()=>comboMacros({items},foods,1),[items,foods]);
  const[pMode,setPMode]=useState('unit'); // 'unit' | 'grams'
  const pCanSwitch=pf?.basis==='per_unit'&&pf?.weightPerUnit;
  const addP=()=>{
    if(!pf)return;
    const v=parseFloat(pa.replace(',','.'));
    if(!v||v<=0)return;
    const amount=(pCanSwitch&&pMode==='grams')?v/pf.weightPerUnit:v;
    setItems(p=>[...p,{id:uid(),foodId:pf.id,amount}]);
    setPf(null);setPa('');setPMode('unit');setAdding(false);setQ('');
  };
  return(
    <div className="modal-bg" onClick={onClose}>

          <div className="display" style={{fontSize:17,fontWeight:600}}>{ed?'Editar combo':'Nuevo combo'}</div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
          <div><label style={{fontSize:12,color:'var(--muted)'}}>Nombre</label><input style={{marginTop:4}} value={name} onChange={e=>setName(e.target.value)} placeholder="ej. Mi ensalada base" autoFocus/></div>
          <div style={{height:1,background:'var(--line2)'}}/>
          {items.map(it=>{const f=foods[it.foodId];const m=f?itemMacros(it,f):null;return(
            <div key={it.id} style={{display:'flex',alignItems:'center',gap:8,paddingBottom:8,borderBottom:'1px solid var(--line)'}}>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f?.name||'[faltante]'}</div>{m&&<div className="mono" style={{fontSize:10,color:'var(--muted)'}}>{ni(m.cal)} kcal</div>}</div>
              <input type="text" className="mono" style={{width:72,fontSize:13,padding:'4px 6px'}} value={it.amount} onChange={e=>{const v=parseFloat(e.target.value.replace(',','.'));setItems(p=>p.map(x=>x.id===it.id?{...x,amount:isNaN(v)?0:v}:x));}}/>
              <span className="mono" style={{fontSize:11,color:'var(--muted)'}}>{f?BU[f.basis]:''}</span>
              <button className="btn btn-danger" style={{padding:'3px 5px'}} onClick={()=>setItems(p=>p.filter(x=>x.id!==it.id))}><IX s={12}/></button>
            </div>
          );})}
          {adding?(
            <div className="card" style={{padding:10}}>
              {!pf?(
                <>
                  <div style={{position:'relative',marginBottom:8}}>
                    <ISearch s={13} style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',pointerEvents:'none'}}/>
                    <input style={{paddingLeft:28}} placeholder="Buscar…" value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
                  </div>
                  <div style={{maxHeight:140,overflowY:'auto'}}>
                    {filtered.map(f=><button key={f.id} style={{display:'block',width:'100%',textAlign:'left',padding:'6px 8px',background:'none',border:'none',borderRadius:4,cursor:'pointer',fontFamily:'inherit',fontSize:13}} className="row" onClick={()=>{setPf(f);setPa('');}}>
                      {f.name}
                    </button>)}
                  </div>
                  <button className="btn btn-ghost btn-xs" style={{marginTop:8}} onClick={()=>{setAdding(false);setQ('');}}>cancelar</button>
                </>
              ):(
                <>
                  <div style={{fontSize:13,fontWeight:500,marginBottom:6}}>{pf.name}</div>
                  {pCanSwitch&&(
                    <div style={{display:'flex',gap:4,marginBottom:8}}>
                      <button className={`btn btn-xs${pMode==='unit'?' btn-primary':''}`} onClick={()=>{setPMode('unit');setPa('');}}>Unidades</button>
                      <button className={`btn btn-xs${pMode==='grams'?' btn-primary':''}`} onClick={()=>{setPMode('grams');setPa('');}}>Gramos</button>

                  )}
                  <div style={{display:'flex',gap:6}}>
                    <input type="text" className="mono" style={{flex:1,fontSize:13}} placeholder={pCanSwitch&&pMode==='grams'?`Cantidad (g) — 1u = ${pf.weightPerUnit}g`:`Cantidad (${BU[pf.basis]})`} value={pa} onChange={e=>setPa(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter')addP();}}/>
                    <button className="btn btn-primary btn-sm" onClick={addP}>+</button>
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setPf(null);setPMode('unit');}}>←</button>
                  </div>

              )}

          ):<button className="btn btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>setAdding(true)} disabled={!foodsArr.length}><IPlus s={13}/>Agregar ítem</button>}

        </div>
      </div>
    </div>
  );
}

/* ── BULK MODAL ── */
function BulkModal({onClose,onImport}){
  const[mode,setMode]=useState('per_100g'); // 'per_100g' | 'per_unit'
  const[text,setText]=useState('');
  const[preview,setPreview]=useState(null);

  const EXAMPLES={
    per_100g:`# Nombre | kcal | Proteínas | Carbohidratos | Grasas | Fibra
Arroz blanco cocido | 130 | 2.7 | 28 | 0.3 | 0.4
Pechuga de pollo | 165 | 31 | 0 | 3.6 | 0
Yogur natural | 60 | 3.5 | 4.7 | 3.3 | 0`,
    per_unit:`# Nombre | kcal | Proteínas | Carbohidratos | Grasas | Fibra | [g/u]
Huevo entero | 155 | 13 | 1.1 | 11 | 0 | 60
Medialuna chica | 180 | 4 | 22 | 9 | 0.5
Banana mediana | 105 | 1.3 | 27 | 0.4 | 3.1 | 118`,
  };

  const FORMAT={
    per_100g:'Nombre | kcal | Proteínas | Carbohidratos | Grasas | Fibra',
    per_unit:'Nombre | kcal | Proteínas | Carbohidratos | Grasas | Fibra | [g/u]',
  };
  const HINT={
    per_100g:'Todos los valores son por cada 100 g del alimento.',
    per_unit:'Valores por unidad. g/u (último campo) es opcional: peso en gramos por unidad.',
  };

  const switchMode=m=>{setMode(m);setPreview(null);};

  const parse=()=>{
    const lines=text.split(/\r?\n/),results=[];
    for(let i=0;i<lines.length;i++){
      const raw=lines[i],t=raw.trim();
      if(!t||t.startsWith('#'))continue;
      const sep=t.includes('|')?'|':'\t';
      const parts=t.split(sep).map(s=>s.trim());
      if(parts.length<2){results.push({ok:false,line:i+1,raw,reason:'Muy pocos campos'});continue;}
      const[rName,rCal,rProt,rCarb,rFat,rFib,rWpu]=parts;
      if(!rName){results.push({ok:false,line:i+1,raw,reason:'Nombre vacío'});continue;}
      const pn=v=>{if(!v||!v.trim())return 0;const nn=parseFloat(v.replace(',','.'));return isNaN(nn)?null:nn;};
      const c=pn(rCal);
      if(c===null){results.push({ok:false,line:i+1,raw,reason:`Calorías inválidas: "${rCal}"`});continue;}
      const wpu=mode==='per_unit'?(parseFloat((rWpu||'').replace(',','.'))||null):null;
      results.push({ok:true,food:{id:uid(),name:rName,basis:mode,cal:c,protein:pn(rProt)??0,carbs:pn(rCarb)??0,fat:pn(rFat)??0,fiber:pn(rFib)??0,notes:'',weightPerUnit:wpu,createdAt:Date.now(),updatedAt:Date.now()}});
    }
    setPreview(results);
  };
  const ok=preview?.filter(r=>r.ok)||[];
  const err=preview?.filter(r=>!r.ok)||[];

  const tabBtn=(m,label)=>(
    <button key={m} onClick={()=>switchMode(m)}
      style={{flex:1,padding:'8px 10px',fontSize:13,fontWeight:500,border:'none',borderBottom:`2px solid ${mode===m?'var(--accent)':'transparent'}`,background:'none',color:mode===m?'var(--accent)':'var(--muted)',cursor:'pointer',fontFamily:'inherit'}}>
      {label}
    </button>
  );

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="display" style={{fontSize:17,fontWeight:600}}>Carga masiva</div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{display:'flex',borderBottom:'1px solid var(--line)'}}>
          {tabBtn('per_100g','Por 100 g')}
          {tabBtn('per_unit','Por unidad')}
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
          <div className="mono" style={{fontSize:11,padding:'8px 12px',background:'rgba(28,24,18,.04)',borderRadius:5,borderLeft:'3px solid var(--line2)'}}>
            <div>{FORMAT[mode]}</div>
            <div style={{color:'var(--muted)',marginTop:3}}>{HINT[mode]}</div>
          </div>
          <details style={{fontSize:12,color:'var(--muted)'}}>
            <summary style={{cursor:'pointer'}}>ver ejemplo</summary>
            <pre style={{fontFamily:'JetBrains Mono',fontSize:11,marginTop:6,padding:8,background:'rgba(28,24,18,.04)',borderRadius:4,whiteSpace:'pre-wrap'}}>{EXAMPLES[mode]}</pre>
            <button className="btn btn-ghost btn-xs" style={{marginTop:4}} onClick={()=>{setText(EXAMPLES[mode]);setPreview(null);}}>Cargar ejemplo</button>
          </details>
          <textarea className="mono" rows={8} style={{fontSize:12,resize:'vertical'}}
            placeholder={mode==='per_100g'?'Arroz blanco cocido | 130 | 2.7 | 28 | 0.3 | 0.4':'Huevo entero | 155 | 13 | 1.1 | 11 | 0 | 60'}
            value={text} onChange={e=>{setText(e.target.value);setPreview(null);}} spellCheck={false} autoFocus/>
          <button className="btn btn-primary" style={{display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}} onClick={parse} disabled={!text.trim()}><ISearch s={14}/>Verificar</button>
          {preview&&(
            <div className="fade-in">
              <div style={{height:1,background:'var(--line2)',marginBottom:8}}/>
              {err.length>0&&<div style={{marginBottom:8}}><div style={{fontSize:12,fontWeight:500,color:'var(--warn)',marginBottom:4}}>{err.length} línea(s) con error:</div>{err.map((r,i)=><div key={i} style={{fontSize:11,padding:'4px 8px',background:'rgba(168,67,31,.05)',borderRadius:4,marginBottom:2}}><span className="mono" style={{color:'var(--muted)'}}>L{r.line}</span> <span style={{color:'var(--warn)'}}>{r.reason}</span></div>)}</div>}
              {ok.length>0&&<div><div style={{fontSize:12,fontWeight:500,color:'var(--accent2)',marginBottom:6}}>{ok.length} alimento(s) listos:</div><div className="card" style={{overflow:'hidden',maxHeight:180,overflowY:'auto'}}>{ok.map((r,i)=><div key={i} style={{display:'flex',alignItems:'center',padding:'6px 12px',borderBottom:'1px solid var(--line)',gap:8}}><span style={{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.food.name}</span><span className="mono" style={{fontSize:11,color:'var(--muted)'}}>{ni(r.food.cal)} kcal · {BL[r.food.basis].replace('por ','')}{r.food.weightPerUnit?` · ${r.food.weightPerUnit}g/u`:''}</span></div>)}</div></div>}
            </div>
          )}
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid var(--line)',display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>onImport(ok.map(r=>r.food))} disabled={!preview||!ok.length}><IPlus s={14}/>Importar {ok.length>0?`(${ok.length})`:''}</button>
        </div>
      </div>
    </div>
  );
}

/* ── EXPORT MODAL ── */
function ExportModal({day,foods,combos,onClose,showToast}){
  const[header,setHeader]=useState(true);
  const[subtotals,setSubtotals]=useState(false);
  const[total,setTotal]=useState(true);
  const[expand,setExpand]=useState(false);
  const[mode,setMode]=useState('day');
  const[df,setDf]=useState(day?.date||todayStr());
  const[dt,setDt]=useState(day?.date||todayStr());
  const[copied,setCopied]=useState(false);
  const buildDay=(d,date)=>{
    const lines=[],ds=fmtShort(date),acc={cal:0,protein:0,carbs:0,fat:0,fiber:0};
    for(const meal of d?.meals||[]){
      const ma={cal:0,protein:0,carbs:0,fat:0,fiber:0};
      for(const it of meal.items||[]){
        if(it.kind==='combo'){const c=combos[it.comboId];if(!c)continue;if(expand){for(const s of c.items){const f=foods[s.foodId];if(!f)continue;const m=itemMacros({amount:s.amount*(it.multiplier||1)},f);lines.push([ds,meal.name,`${f.name} (${c.name})`,n(s.amount*(it.multiplier||1),2),BU[f.basis],n(m.cal,1),n(m.protein,1),n(m.carbs,1),n(m.fat,1),n(m.fiber,1)].join('\t'));ma.cal+=m.cal;ma.protein+=m.protein;ma.carbs+=m.carbs;ma.fat+=m.fat;ma.fiber+=m.fiber;}}else{const m=comboMacros(c,foods,it.multiplier||1);lines.push([ds,meal.name,`[Combo] ${c.name}`,n(it.multiplier||1,2),'x',n(m.cal,1),n(m.protein,1),n(m.carbs,1),n(m.fat,1),n(m.fiber,1)].join('\t'));ma.cal+=m.cal;ma.protein+=m.protein;ma.carbs+=m.carbs;ma.fat+=m.fat;ma.fiber+=m.fiber;}}
        else{const f=foods[it.foodId];if(!f)continue;const m=itemMacros(it,f);lines.push([ds,meal.name,f.name,n(it.amount,2),BU[f.basis],n(m.cal,1),n(m.protein,1),n(m.carbs,1),n(m.fat,1),n(m.fiber,1)].join('\t'));ma.cal+=m.cal;ma.protein+=m.protein;ma.carbs+=m.carbs;ma.fat+=m.fat;ma.fiber+=m.fiber;}
      }
      if(subtotals&&meal.items.length)lines.push([ds,meal.name,'[Subtotal]','','',n(ma.cal,1),n(ma.protein,1),n(ma.carbs,1),n(ma.fat,1),n(ma.fiber,1)].join('\t'));
      acc.cal+=ma.cal;acc.protein+=ma.protein;acc.carbs+=ma.carbs;acc.fat+=ma.fat;acc.fiber+=ma.fiber;
    }
    if(total&&(d?.meals||[]).length)lines.push([ds,'[Total día]','','','',n(acc.cal,1),n(acc.protein,1),n(acc.carbs,1),n(acc.fat,1),n(acc.fiber,1)].join('\t'));
    return lines;
  };
  const text=useMemo(()=>{
    const lines=[];
    if(header)lines.push(['Fecha','Comida','Alimento','Cantidad','Unidad','Calorías','Proteínas','Carbohidratos','Grasas','Fibra'].join('\t'));
    if(mode==='day'){buildDay(day,day?.date||todayStr()).forEach(l=>lines.push(l));}
    else{let cur=df;while(cur<=dt){const d=lsGet('day:'+cur,null);if(d)buildDay(d,cur).forEach(l=>lines.push(l));cur=shiftDate(cur,1);if(lines.length>2000)break;}}
    return lines.join('\n');
  },[day,header,subtotals,total,expand,mode,df,dt]);
  const copy=async()=>{try{await navigator.clipboard.writeText(text);setCopied(true);showToast('Copiado');setTimeout(()=>setCopied(false),1500);}catch{showToast('No se pudo copiar');}};
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:680}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="display" style={{fontSize:17,fontWeight:600}}>Exportar para Excel</div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:4}}>
            <button className={`tab${mode==='day'?' active':''}`} style={{fontSize:13}} onClick={()=>setMode('day')}>Día actual</button>
            <button className={`tab${mode==='range'?' active':''}`} style={{fontSize:13}} onClick={()=>setMode('range')}>Rango</button>
          </div>
          {mode==='range'&&(
            <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'flex-end'}}>
              <div><label style={{fontSize:12,color:'var(--muted)'}}>Desde</label><input type="date" className="mono" style={{marginTop:4,width:'auto'}} value={df} onChange={e=>setDf(e.target.value)}/></div>
              <div><label style={{fontSize:12,color:'var(--muted)'}}>Hasta</label><input type="date" className="mono" style={{marginTop:4,width:'auto'}} value={dt} onChange={e=>setDt(e.target.value)}/></div>
            </div>
          )}
          <div style={{display:'flex',flexWrap:'wrap',gap:12,fontSize:12}}>
            {[['header','Encabezado',header,setHeader],['sub','Subtotales',subtotals,setSubtotals],['tot','Total día',total,setTotal],['exp','Expandir combos',expand,setExpand]].map(([k,l,v,s])=>(
              <label key={k} style={{display:'inline-flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={v} onChange={e=>s(e.target.checked)}/>{l}</label>
            ))}
          </div>
          <textarea readOnly className="mono" rows={9} style={{fontSize:11,resize:'vertical'}} value={text} onClick={e=>e.target.select()}/>
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid var(--line)',display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Cerrar</button>
          <button className="btn btn-primary" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={copy}>{copied?<><ICheck s={13}/>Copiado</>:<><ICopy s={13}/>Copiar</>}</button>
        </div>
      </div>
    </div>
  );
}

/* ── SYNC CONFLICT MODAL ── */
function SyncConflictModal({remote,remoteTs,localTs,onUseLocal,onUseRemote,onClose}){
  const fmt=ts=>{if(!ts)return'—';const d=new Date(ts);return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
  const localSnap={foods:lsGet('foods',{}),days:{}};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith('dc3_day:'))localSnap.days[k.replace('dc3_day:','')]=1;}
  const localFoods=Object.keys(localSnap.foods).length;
  const localDays=Object.keys(localSnap.days).length;
  const remoteFoods=Object.keys(remote?.foods||{}).length;
  const remoteDays=Object.keys(remote?.days||{}).length;
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="card" style={{maxWidth:460,width:'100%'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:18}}>⚠️</span>
            <div className="display" style={{fontSize:17,fontWeight:600}}>Conflicto de sincronización</div>
          </div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:12}}>
          <div style={{fontSize:13,color:'var(--ink2)'}}>Hay cambios en esta compu <strong>y</strong> en Drive que no están sincronizados. ¿Con cuál te quedás?</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{padding:'12px',borderRadius:6,border:'2px solid var(--line)',display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--muted)'}}>Esta compu</div>
              <div className="mono" style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{fmt(localTs)}</div>
              <div style={{fontSize:12,color:'var(--ink2)'}}>{localFoods} alimentos · {localDays} días</div>
              <button className="btn btn-primary btn-sm" style={{marginTop:4}} onClick={onUseLocal}>Usar esta compu</button>
            </div>
            <div style={{padding:'12px',borderRadius:6,border:'2px solid var(--line)',display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--muted)'}}>Drive</div>
              <div className="mono" style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{fmt(remoteTs)}</div>
              <div style={{fontSize:12,color:'var(--ink2)'}}>{remoteFoods} alimentos · {remoteDays} días</div>
              <button className="btn btn-sm" style={{marginTop:4}} onClick={onUseRemote}>Usar Drive</button>
            </div>
          </div>
          <div style={{fontSize:11,color:'var(--muted)',paddingTop:4,borderTop:'1px dashed var(--line)'}}>La versión que no elijas se va a perder. Si no estás seguro, cerrá este diálogo y hacé un backup manual primero.</div>
        </div>
      </div>
    </div>
  );
}

/* ── DRIVE MODAL ── */
function DriveModal({onClose,signedIn,syncState,syncErr,lastSyncTs,isOnline,onSignIn,onSignOut,onSyncNow}){
  const fmtTs=(ts)=>{
    if(!ts)return'—';
    const d=new Date(ts);
    const today=new Date();
    const sameDay=d.toDateString()===today.toDateString();
    const hh=String(d.getHours()).padStart(2,'0');
    const mm=String(d.getMinutes()).padStart(2,'0');
    if(sameDay)return `hoy ${hh}:${mm}`;
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${hh}:${mm}`;
  };
  const stateLabel=!isOnline?'Sin conexión':{
    init:'Inicializando…',
    idle:'Desconectado',
    syncing:'Sincronizando…',
    synced:'Sincronizado',
    error:'Error',
    offline:'Sin conexión',
  }[syncState]||syncState;
  const stateColor=!isOnline?'var(--muted)':{
    syncing:'var(--accent2)',
    synced:'var(--accent)',
    error:'var(--warn)',
    idle:'var(--muted)',
    init:'var(--muted)',
  }[syncState]||'var(--ink2)';

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="card" style={{maxWidth:440,width:'100%',maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <ICloud s={18}/>
            <div className="display" style={{fontSize:17,fontWeight:600}}>Google Drive</div>
          </div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:14}}>
          {!signedIn?(
            <>
              <div style={{fontSize:13,color:'var(--ink2)',lineHeight:1.5}}>
                Sincronizá tus datos entre dispositivos. Toda la información se guarda en una zona oculta de tu Drive (no contamina tus archivos).
              </div>
              <ul style={{fontSize:12,color:'var(--muted)',paddingLeft:18,lineHeight:1.6}}>
                <li>Solo accede a una carpeta privada de la app</li>
                <li>No puede leer tus otros archivos</li>
                <li>Funciona offline: los cambios se sincronizan al volver online</li>
              </ul>
              {syncErr&&<div style={{padding:'8px 12px',background:'rgba(168,67,31,.08)',color:'var(--warn)',borderRadius:5,fontSize:12,borderLeft:'3px solid var(--warn)'}}>{syncErr}</div>}
              <button className="btn btn-primary" style={{display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}} onClick={onSignIn} disabled={syncState==='syncing'}>
                <ICloud s={14}/>{syncState==='syncing'?'Conectando…':'Conectar con Google'}
              </button>
            </>
          ):(
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'rgba(91,107,58,.05)',borderRadius:5,borderLeft:`3px solid ${stateColor}`}}>
                <div>
                  <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Estado</div>
                  <div style={{fontSize:14,fontWeight:500,color:stateColor,marginTop:2}}>{stateLabel}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Última sync</div>
                  <div className="mono" style={{fontSize:13,marginTop:2}}>{fmtTs(lastSyncTs)}</div>
                </div>
              </div>
              {syncErr&&<div style={{padding:'8px 12px',background:'rgba(168,67,31,.08)',color:'var(--warn)',borderRadius:5,fontSize:12,borderLeft:'3px solid var(--warn)',wordBreak:'break-word'}}>{syncErr}</div>}
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button className="btn btn-primary" style={{flex:1,display:'inline-flex',alignItems:'center',gap:5,justifyContent:'center'}} onClick={onSyncNow} disabled={syncState==='syncing'||!isOnline}>
                  <IRefresh s={13}/>Sincronizar ahora
                </button>
                {syncState==='error'&&<button className="btn btn-primary" style={{display:'inline-flex',alignItems:'center',gap:5}} onClick={onSignIn}><ICloud s={13}/>Reconectar</button>}
                <button className="btn" style={{display:'inline-flex',alignItems:'center',gap:5}} onClick={onSignOut}>Desconectar</button>
              </div>
              <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.5,paddingTop:8,borderTop:'1px dashed var(--line)'}}>
                Los cambios se sincronizan automáticamente unos segundos después de cada edición. Si trabajás offline, se suben al volver la conexión.
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── HELP MODAL ── */
function HelpModal({onClose}){
  const items=[
    ['t','Ir a Hoy'],
    ['w','Ir a Semana'],
    ['f','Ir a Alimentos'],
    ['c','Ir a Combos'],
    ['n','Nueva colación (en Hoy)'],
    ['[ / ]','Día anterior / siguiente'],
    ['/','Enfocar buscador'],
  ];
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="card" style={{maxWidth:380,width:'100%',maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)'}}>
          <div className="display" style={{fontSize:17,fontWeight:600}}>Atajos de teclado</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>No funcionan mientras escribís en un campo</div>
        </div>
        <div style={{padding:'10px 18px',display:'flex',flexDirection:'column',gap:6}}>
          {items.map(([k,d])=>(
            <div key={k} style={{display:'flex',alignItems:'center',gap:10,padding:'4px 0',borderBottom:'1px dashed var(--line)'}}>
              <kbd className="mono" style={{padding:'2px 7px',background:'var(--line)',borderRadius:4,fontSize:12,minWidth:36,textAlign:'center'}}>{k}</kbd>
              <span style={{fontSize:13}}>{d}</span>
            </div>
          ))}
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={onClose}>Listo</button>
        </div>
      </div>
    </div>
  );
}

function SettingsModal({settings,onClose,onSave}){
  const[s,setS]=useState({...settings});
  const sg=(k,v)=>setS(p=>({...p,goals:{...p.goals,[k]:v}}));
  const pn=v=>{const nn=parseFloat(String(v).replace(',','.'));return isNaN(nn)?null:nn;};
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="display" style={{fontSize:17,fontWeight:600}}>Ajustes</div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:14,fontWeight:500}}>Distribución de macros</div><div style={{fontSize:12,color:'var(--muted)'}}>Barra P/C/G en el total del día</div></div>
            <label style={{display:'inline-flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={s.showDist} onChange={e=>setS(p=>({...p,showDist:e.target.checked}))}/><span style={{fontSize:13}}>Mostrar</span></label>
          </div>
          <div style={{height:1,background:'var(--line2)'}}/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:14,fontWeight:500}}>Objetivos diarios</div><div style={{fontSize:12,color:'var(--muted)'}}>Muestra barras de progreso</div></div>
            <label style={{display:'inline-flex',alignItems:'center',gap:6,cursor:'pointer'}}><input type="checkbox" checked={s.showGoals} onChange={e=>setS(p=>({...p,showGoals:e.target.checked}))}/><span style={{fontSize:13}}>Mostrar</span></label>
          </div>
          {s.showGoals&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[['cal','Calorías (kcal)'],['protein','Proteínas (g)'],['carbs','Carbohidratos (g)'],['fat','Grasas (g)']].map(([k,l])=>(
                <div key={k}><label style={{fontSize:12,color:'var(--muted)'}}>{l}</label><input type="text" className="mono" style={{marginTop:3}} value={s.goals?.[k]??''} onChange={e=>sg(k,e.target.value)}/></div>
              ))}
              <div style={{gridColumn:'1/-1'}}><label style={{fontSize:12,color:'var(--muted)'}}>Fibra (g)</label><input type="text" className="mono" style={{marginTop:3}} value={s.goals?.fiber??''} onChange={e=>sg('fiber',e.target.value)}/></div>
            </div>
          )}
          <div style={{height:1,background:'var(--line2)'}}/>
          <div><div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Objetivo de agua (ml/día)</div><input type="text" className="mono" style={{width:120}} value={s.waterGoal||2000} onChange={e=>setS(p=>({...p,waterGoal:parseInt(e.target.value)||2000}))}/></div>
          <div><div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Objetivo de peso (kg)</div><input type="text" className="mono" style={{width:120}} placeholder="Ej: 100" value={s.weightGoal||''} onChange={e=>setS(p=>({...p,weightGoal:parseFloat(e.target.value.replace(',','.'))||null}))}/><div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>Se muestra como línea en el gráfico semanal</div></div>
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid var(--line)',display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={()=>onSave({...s,goals:{cal:pn(s.goals?.cal),protein:pn(s.goals?.protein),carbs:pn(s.goals?.carbs),fat:pn(s.goals?.fat),fiber:pn(s.goals?.fiber)}})}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ── DUP DAY MODAL ── */
function DupDayModal({currentDate,onClose,onDup}){
  const[target,setTarget]=useState(shiftDate(currentDate,1));
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div className="display" style={{fontSize:17,fontWeight:600}}>Duplicar comidas</div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={onClose}><IX/></button>
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:13,color:'var(--ink2)'}}>Copia todas las comidas de <strong>{fmtShort(currentDate)}</strong> al día elegido. Las comidas existentes en el destino se mantienen.</div>
          <div><label style={{fontSize:12,color:'var(--muted)'}}>Copiar a</label><input type="date" className="mono" style={{marginTop:4}} value={target} onChange={e=>setTarget(e.target.value)}/></div>
          {target===currentDate&&<div style={{fontSize:12,color:'var(--warn)'}}>El destino es el mismo día.</div>}
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid var(--line)',display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>onDup(target)} disabled={target===currentDate}><ICopy s={13}/>Copiar</button>
        </div>
      </div>
    </div>
  );
}

/* ── MOUNT ── */
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
