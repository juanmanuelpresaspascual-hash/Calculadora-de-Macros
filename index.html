<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#1a1812;--paper2:#211f18;--ink:#f0ebe0;--ink2:#c8bfb0;
  --muted:#7a7268;--line:#2e2b22;--line2:#3a362c;
  --accent:#7a9a50;--accent2:#9ab868;--warn:#d4622e;--gold:#c8a040;
  --water:#5a9bc0;--safe-top:env(safe-area-inset-top,0px);
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Instrument Sans',sans-serif;
  background:var(--paper);color:var(--ink);
  min-height:100vh;
  background-image:radial-gradient(circle at 1px 1px,rgba(28,24,18,0.05) 1px,transparent 0);
  background-size:18px 18px;
  padding-top:var(--safe-top);
}
.display{font-family:'Fraunces',serif;font-optical-sizing:auto;letter-spacing:-0.015em}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.card{background:var(--paper2);border:1px solid var(--line);border-radius:8px}
button{font-family:'Instrument Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .12s}
button:active{transform:translateY(1px)}
.btn{background:var(--paper2);border:1px solid var(--line2);border-radius:5px;padding:7px 14px;color:var(--ink);font-size:14px}
.btn:hover{border-color:var(--ink2);background:#fff}
.btn-primary{background:var(--accent);color:#fdfaf2;border-color:var(--accent2)}
.btn-primary:hover{background:var(--accent2);color:#fff}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink2)}
.btn-ghost:hover{background:rgba(28,24,18,0.06);border-color:transparent}
.btn-danger{background:transparent;border-color:transparent;color:var(--warn)}
.btn-danger:hover{background:rgba(168,67,31,0.09)}
.btn-sm{padding:5px 10px;font-size:13px}
.btn-xs{padding:3px 8px;font-size:12px}
input,textarea,select{
  font-family:'Instrument Sans',sans-serif;
  background:var(--paper2);border:1px solid var(--line2);
  border-radius:5px;padding:7px 10px;color:var(--ink);
  outline:none;font-size:14px;width:100%;
  transition:border-color .12s;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,107,58,0.12)}
input.mono,textarea.mono{font-family:'JetBrains Mono',monospace;font-size:13px}
.divider{height:1px;background:linear-gradient(to right,transparent,var(--line2) 20%,var(--line2) 80%,transparent);margin:12px 0}
.tab{padding:6px 14px;border-radius:5px;font-weight:500;cursor:pointer;color:var(--ink2);font-size:14px;background:transparent;border:none;transition:all .12s}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--ink);color:var(--paper2)}
.modal-bg{position:fixed;inset:0;background:rgba(20,16,10,.48);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--paper2);border:1px solid var(--line2);border-radius:10px;max-width:540px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(20,16,10,.25)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:500;background:rgba(91,107,58,.1);color:var(--accent2);border:1px solid rgba(91,107,58,.2)}
.pill-warn{background:rgba(168,67,31,.08);color:var(--warn);border-color:rgba(168,67,31,.2)}
.pill-gold{background:rgba(184,138,44,.1);color:var(--gold);border-color:rgba(184,138,44,.2)}
.row:hover{background:rgba(28,24,18,.03)}
.bookmark{border-left:3px solid var(--accent);padding-left:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .18s ease-out}
.toast-el{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper2);padding:10px 20px;border-radius:99px;font-size:14px;font-weight:500;z-index:100;box-shadow:0 8px 24px rgba(20,16,10,.25);animation:fadeIn .18s ease-out;white-space:nowrap}
.prog-track{height:4px;background:var(--line);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);transition:width .3s}
.prog-over{background:var(--warn)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
.hs-parent .hs{opacity:0;transition:opacity .12s}
.hs-parent:hover .hs{opacity:1}
.warn-bar{background:rgba(168,67,31,.07);border-bottom:1px solid rgba(168,67,31,.18);padding:8px 20px}
.ok-bar{background:rgba(91,107,58,.07);border-bottom:1px solid rgba(91,107,58,.18);padding:6px 20px}
.grid-foods{display:grid;grid-template-columns:20px 1fr 70px 52px 52px 52px 52px 80px;gap:8px;align-items:center}
.grid-week{display:grid;grid-template-columns:90px 1fr 1fr 1fr 1fr 1fr 60px 55px;gap:8px;align-items:center}
@media(max-width:600px){
  .grid-foods{grid-template-columns:20px 1fr 60px 44px 44px 44px 90px}
  .grid-foods .col-fat,.grid-week .col-fat{display:none}
  .grid-week{grid-template-columns:72px 1fr 1fr 1fr 1fr 50px 48px}
}
.spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.water-ring{transform:rotate(-90deg);transform-origin:center}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

/* ── UTILS ── */
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const shiftDate=(s,n)=>{const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;};
const fmtLong=(s)=>{const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return `${dias[dt.getDay()]}, ${d} de ${meses[m-1]}`;};
const fmtShort=(s)=>{const[y,m,d]=s.split('-');return `${d}/${m}/${y}`;};
const n=(v,dec=1)=>{if(v==null||isNaN(v))return'—';return(+v).toFixed(dec).replace(/\.?0+$/,'');};
const ni=(v)=>isNaN(v)?'—':Math.round(v).toString();
const BL={per_100g:'por 100g',per_100ml:'por 100ml',per_unit:'por unidad'};
const BU={per_100g:'g',per_100ml:'ml',per_unit:'u'};

/* ── STORAGE (localStorage — persists in Safari file:// and web) ── */
const LS='dc3_';
const lsGet=(k,fb=null)=>{try{const r=localStorage.getItem(LS+k);return r!==null?JSON.parse(r):fb;}catch{return fb;}};
const lsSet=(k,v)=>{try{localStorage.setItem(LS+k,JSON.stringify(v));}catch(e){console.warn('storage full?',e);}};
const lsDel=(k)=>{try{localStorage.removeItem(LS+k);}catch{}};

/* ── MACROS ── */
const itemMacros=(item,food)=>{
  if(!food)return{cal:0,protein:0,carbs:0,fat:0,fiber:0};
  const f=food.basis==='per_unit'?item.amount:item.amount/100;
  return{cal:(food.cal||0)*f,protein:(food.protein||0)*f,carbs:(food.carbs||0)*f,fat:(food.fat||0)*f,fiber:(food.fiber||0)*f};
};
const comboMacros=(combo,foods,mult=1)=>{
  const a={cal:0,protein:0,carbs:0,fat:0,fiber:0};
  for(const it of combo.items||[]){const f=foods[it.foodId];if(!f)continue;const m=itemMacros(it,f);a.cal+=m.cal;a.protein+=m.protein;a.carbs+=m.carbs;a.fat+=m.fat;a.fiber+=m.fiber;}
  return{cal:a.cal*mult,protein:a.protein*mult,carbs:a.carbs*mult,fat:a.fat*mult,fiber:a.fiber*mult};
};
const mealMacros=(meal,foods,combos)=>{
  const a={cal:0,protein:0,carbs:0,fat:0,fiber:0};
  for(const it of meal.items||[]){
    const m=it.kind==='combo'?comboMacros(combos[it.comboId]||{items:[]},foods,it.multiplier||1):itemMacros(it,foods[it.foodId]);
    a.cal+=m.cal;a.protein+=m.protein;a.carbs+=m.carbs;a.fat+=m.fat;a.fiber+=m.fiber;
  }
  return a;
};
const dayMacros=(day,foods,combos)=>{
  const a={cal:0,protein:0,carbs:0,fat:0,fiber:0};
  for(const meal of day?.meals||[]){const m=mealMacros(meal,foods,combos);a.cal+=m.cal;a.protein+=m.protein;a.carbs+=m.carbs;a.fat+=m.fat;a.fiber+=m.fiber;}
  return a;
};

/* ── FUZZY SEARCH ── */
const fuzzy=(q,s)=>{const ql=q.toLowerCase().trim(),sl=s.toLowerCase();if(!ql)return 1;if(sl===ql)return 100;if(sl.startsWith(ql))return 80;if(sl.includes(ql))return 60;if(ql.split(/\s+/).every(w=>sl.includes(w)))return 40;return 0;};

/* ── BACKUP ── */
const encodeBackup=(foods,combos,days)=>{
  const data={v:3,foods,combos,days:days||{},ts:Date.now()};
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
};
const decodeBackup=(str)=>{
  try{const d=JSON.parse(decodeURIComponent(escape(atob(str.trim()))));return(d.v>=2&&d.foods)?d:null;}catch{return null;}
};

/* ── LABEL TEXT PARSER ── */
const parseLabelText=(text)=>{
  if(!text?.trim())return null;
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const nums=(l)=>(l.match(/-?\d+(?:[.,]\d+)?/g)||[]).map(s=>parseFloat(s.replace(',','.')));
  let portionG=null;
  for(const l of lines){if(/porci[oó]n|serving/i.test(l)){const m=l.match(/(\d+(?:[.,]\d+)?)\s*g\b/i);if(m)portionG=parseFloat(m[1]);}}
  const grab=(rx)=>{for(const l of lines){if(rx.test(l.toLowerCase())){const ns=nums(l);if(ns.length)return ns.length>=2?{p:ns[0],h:ns[ns.length-1]}:{s:ns[0]};}}return null;};
  const cal=grab(/valor energ|calor[ií]as|kcal|energ[ií]a/);
  const prot=grab(/prote[ií]nas?\b/);
  const carb=grab(/(carbohidratos?|hidratos? de carbono)/);
  const fat=grab(/grasas? totales?|grasas?\b/);
  const fib=grab(/fibra/);
  const any2=[cal,prot,carb,fat,fib].some(g=>g&&g.p!=null&&g.h!=null&&g.h!==g.p);
  const pick=(g)=>{if(!g)return null;if(any2)return g.h??g.s??null;if(portionG)return g.p??g.s??null;return g.h??g.s??null;};
  let c=pick(cal);
  if(c&&c>900){const l=lines.find(l=>/kcal|kj/i.test(l));if(l){const ns=nums(l);if(ns.length>=2)c=Math.min(...ns);}}
  return{cal:c,protein:pick(prot),carbs:pick(carb),fat:pick(fat),fiber:pick(fib),portionG,scaledFrom:(!any2&&portionG)?portionG:null};
};

/* ── SUGGEST MEAL NAME ── */
const suggestMealName=(names)=>`Colación ${names.filter(n=>/^colaci[oó]n/i.test(n)).length+1}`;





/* ── ICONS (inline SVG components) ── */

  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">

const IMoon=({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
const ISun=({s=16})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;

/* ── GOOGLE DRIVE SYNC MODULE ── */
const GDRIVE = {
  CLIENT_ID: '678927221934-r0uv2tvhl5709i0p7oibbna200j78djl.apps.googleusercontent.com',
  SCOPE: 'https://www.googleapis.com/auth/drive.appdata',
  FILE_NAME: 'diario-cocina-data.json',
  fileId: null,
  tokenClient: null,
  accessToken: null,
  tokenExpiry: 0,
  initialized: false,

  async _waitForLibs(){
    let tries=0;
    while(tries<100){if(window.gapi&&window.google?.accounts?.oauth2)return;await new Promise(r=>setTimeout(r,100));tries++;}
    throw new Error('Google APIs no cargaron');
  },

  async init(){
    if(this.initialized)return;
    await this._waitForLibs();
    await new Promise((res,rej)=>gapi.load('client',{callback:res,onerror:rej}));
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    this.tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:this.CLIENT_ID,
      scope:this.SCOPE,
      callback:()=>{}
    });
    this.initialized=true;
  },

  _setToken(resp){
    this.accessToken=resp.access_token;
    this.tokenExpiry=Date.now()+(((resp.expires_in||3599)-60)*1000);
    gapi.client.setToken({access_token:resp.access_token});
    try{localStorage.setItem('dc3_drive_signed','1');}catch(e){}
  },

  isTokenValid(){
    return this.accessToken&&Date.now()<this.tokenExpiry;
  },

  signIn(interactive=true){
    return new Promise((resolve,reject)=>{
      this.tokenClient.callback=(resp)=>{
        if(resp.error){reject(new Error(resp.error_description||resp.error));return;}
        this._setToken(resp);
        resolve(resp);
      };
      this.tokenClient.error_callback=(err)=>{
        reject(new Error(err?.message||err?.type||'Error de autenticación'));
      };
      this.tokenClient.requestAccessToken({prompt:interactive?'':'none'});
    });
  },

  async ensureToken(){
    if(this.isTokenValid())return;
    try{
      await this.signIn(false);
    }catch(e){
      await this.signIn(true);
    }
  },

  signOut(){
    if(this.accessToken){try{google.accounts.oauth2.revoke(this.accessToken,()=>{});}catch(e){}}
    this.accessToken=null;
    this.tokenExpiry=0;
    this.fileId=null;
    if(window.gapi?.client)gapi.client.setToken(null);
    try{localStorage.removeItem('dc3_drive_signed');}catch(e){}
  },

  async findFile(){
    await this.ensureToken();
    const resp=await gapi.client.drive.files.list({
      spaces:'appDataFolder',
      q:`name='${this.FILE_NAME}' and trashed=false`,
      fields:'files(id,modifiedTime)',
      pageSize:10
    });
    const files=resp.result.files||[];
    if(files.length){this.fileId=files[0].id;return files[0];}
    this.fileId=null;
    return null;
  },

  async load(){
    await this.ensureToken();
    if(!this.fileId)await this.findFile();
    if(!this.fileId)return null;
    const resp=await gapi.client.drive.files.get({fileId:this.fileId,alt:'media'});
    if(typeof resp.body==='string'){try{return JSON.parse(resp.body);}catch(e){return null;}}
    return resp.result||null;
  },

  async save(data){
    await this.ensureToken();
    const body=JSON.stringify(data);
    if(!this.fileId)await this.findFile();
    if(!this.fileId){
      const metadata={name:this.FILE_NAME,parents:['appDataFolder']};
      const boundary='-------dc314159265';
      const delim=`\r\n--${boundary}\r\n`;
      const closeDelim=`\r\n--${boundary}--`;
      const multipartBody=delim+'Content-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+delim+'Content-Type: application/json; charset=UTF-8\r\n\r\n'+body+closeDelim;
      const resp=await gapi.client.request({path:'/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart',fields:'id,modifiedTime'},headers:{'Content-Type':`multipart/related; boundary="${boundary}"`},body:multipartBody});
      this.fileId=resp.result.id;
      return resp.result;
    }else{
      const resp=await gapi.client.request({path:`/upload/drive/v3/files/${this.fileId}`,method:'PATCH',params:{uploadType:'media',fields:'id,modifiedTime'},headers:{'Content-Type':'application/json; charset=UTF-8'},body:body});
      return resp.result;
    }
  }
};

/* ── TOAST ── */
function Toast({msg}){return <div className="toast-el">{msg}</div>;}

/* ── APP ROOT ── */
function App(){
  const[foods,setFoods]=useState(()=>lsGet('foods',{}));
  const[combos,setCombos]=useState(()=>lsGet('combos',{}));
  const[usage,setUsage]=useState(()=>lsGet('usage',{}));
  const[settings,setSettings]=useState(()=>({goals:{cal:null,protein:null,carbs:null,fat:null,fiber:null},showGoals:false,showDist:true,waterGoal:2000,...lsGet('settings',{})}));
  const[date,setDate]=useState(todayStr);
  const[day,setDay]=useState(()=>lsGet('day:'+todayStr(),{date:todayStr(),meals:[],notes:'',waterMl:0,weightKg:null,gymDay:false}));
  const[view,setView]=useState('today');
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState(null);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2000);};

  // Persist everything on change
  useEffect(()=>lsSet('foods',foods),[foods]);
  useEffect(()=>lsSet('combos',combos),[combos]);
  useEffect(()=>lsSet('usage',usage),[usage]);
  useEffect(()=>lsSet('settings',settings),[settings]);
  useEffect(()=>{
    if(!day)return;
    const empty=!day.meals?.length&&!day.notes&&!day.waterMl&&day.weightKg==null&&!day.gymDay;
    if(empty)lsDel('day:'+day.date);
    else lsSet('day:'+day.date,day);
  },[day]);

  // Load day when date changes
  useEffect(()=>{
    setDay(lsGet('day:'+date,{date,meals:[],notes:'',waterMl:0,weightKg:null,gymDay:false}));
  },[date]);

  // Atajos de teclado globales
  useEffect(()=>{
    const onKey=e=>{
      if(modal)return;
      const t=e.target;
      const inField=t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable);
      if(e.key==='/'&&!inField){
        e.preventDefault();
        const inp=document.querySelector('input[placeholder*="Buscar"]');
        if(inp)inp.focus();
        return;
      }
      if(inField||e.ctrlKey||e.metaKey||e.altKey)return;
      if(e.key==='?'){e.preventDefault();setModal({type:'help'});return;}
      if(e.key==='t')setView('today');
      else if(e.key==='w')setView('week');
      else if(e.key==='f')setView('foods');
      else if(e.key==='c')setView('combos');
      else if(view==='today'&&e.key==='n'){e.preventDefault();setDay(p=>{const meals=p?.meals||[];return{...p,meals:[...meals,{id:uid(),name:suggestMealName(meals.map(m=>m.name)),items:[]}]};});}
      else if(view==='today'&&e.key==='[')setDate(d=>shiftDate(d,-1));
      else if(view==='today'&&e.key===']')setDate(d=>shiftDate(d,1));
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[view,modal]);

  /* ── DRIVE SYNC ── */
  const[signedIn,setSignedIn]=useState(false);
  const[syncState,setSyncState]=useState('init'); // 'init'|'idle'|'syncing'|'synced'|'error'|'offline'
  const[syncErr,setSyncErr]=useState(null);
  const[lastSyncTs,setLastSyncTs]=useState(()=>parseInt(lsGet('meta_lastSyncTs','0'))||null);
  const[isOnline,setIsOnline]=useState(()=>typeof navigator!=='undefined'?navigator.onLine:true);
  const syncRef=useRef({applyingRemote:false,pushTimer:null,initDone:false});

  const buildSnapshot=useCallback(()=>{
    const days={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith(LS+'day:')){
        const dateKey=k.replace(LS+'day:','');
        const d=lsGet('day:'+dateKey,null);
        if(d)days[dateKey]=d;
      }
    }
    return{
      v:1,
      ts:Date.now(),
      foods:lsGet('foods',{}),
      combos:lsGet('combos',{}),
      usage:lsGet('usage',{}),
      settings:lsGet('settings',{}),
      days
    };
  },[]);

  const applySnapshot=useCallback((snap)=>{
    if(!snap)return;
    syncRef.current.applyingRemote=true;
    // Borrar días viejos del LS
    const toDel=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith(LS+'day:'))toDel.push(k);
    }
    toDel.forEach(k=>localStorage.removeItem(k));
    // Escribir días nuevos
    Object.entries(snap.days||{}).forEach(([d,data])=>lsSet('day:'+d,data));
    // LS principal
    lsSet('foods',snap.foods||{});
    lsSet('combos',snap.combos||{});
    lsSet('usage',snap.usage||{});
    lsSet('settings',snap.settings||{});
    // Forzar React state reload
    setFoods(snap.foods||{});
    setCombos(snap.combos||{});
    setUsage(snap.usage||{});
    setSettings(p=>({...p,...(snap.settings||{})}));
    setDay(lsGet('day:'+date,{date,meals:[],notes:'',waterMl:0,weightKg:null,gymDay:false}));
    setTimeout(()=>{syncRef.current.applyingRemote=false;},250);
  },[date]);

  const pushToCloud=useCallback(async()=>{
    if(!signedIn||!isOnline)return;
    setSyncState('syncing');
    setSyncErr(null);
    try{
      const snap=buildSnapshot();
      const r=await GDRIVE.save(snap);
      const ts=r.modifiedTime?new Date(r.modifiedTime).getTime():Date.now();
      lsSet('meta_lastSyncTs',ts);
      lsSet('meta_localTs',ts);
      setLastSyncTs(ts);
      setSyncState('synced');
    }catch(e){
      console.error('Push error:',e);
      setSyncErr(String(e?.message||e));
      setSyncState('error');
    }
  },[signedIn,isOnline,buildSnapshot]);

  const schedulePush=useCallback(()=>{
    clearTimeout(syncRef.current.pushTimer);
    syncRef.current.pushTimer=setTimeout(()=>{pushToCloud();},2000);
  },[pushToCloud]);

  const syncNow=useCallback(async()=>{
    if(!signedIn||!isOnline)return;
    setSyncState('syncing');
    setSyncErr(null);
    try{
      const file=await GDRIVE.findFile();
      if(!file){
        // Primer sync, subir local
        await pushToCloud();
        return;
      }
      const remoteTs=new Date(file.modifiedTime).getTime();
      const localTs=parseInt(lsGet('meta_localTs','0'))||0;
      const lastSync=parseInt(lsGet('meta_lastSyncTs','0'))||0;
      const hasLocalChanges=localTs>lastSync;
      const hasRemoteChanges=remoteTs>lastSync;

      if(!hasLocalChanges&&!hasRemoteChanges){
        lsSet('meta_lastSyncTs',remoteTs);
        setLastSyncTs(remoteTs);
        setSyncState('synced');
        return;
      }
      if(hasRemoteChanges&&!hasLocalChanges){
        const data=await GDRIVE.load();
        applySnapshot(data);
        lsSet('meta_lastSyncTs',remoteTs);
        lsSet('meta_localTs',remoteTs);
        setLastSyncTs(remoteTs);
        setSyncState('synced');
        return;
      }
      if(hasLocalChanges&&!hasRemoteChanges){
        await pushToCloud();
        return;
      }
      // Conflicto: mostrar modal en lugar de pisar silenciosamente
      if(hasLocalChanges&&hasRemoteChanges){
        const data=await GDRIVE.load();
        setSyncState('idle');
        setModal({type:'syncConflict',remote:data,remoteTs,localTs});
        return;
      }
    }catch(e){
      console.error('Sync error:',e);
      setSyncErr(String(e?.message||e));
      setSyncState('error');
    }
  },[signedIn,isOnline,applySnapshot,pushToCloud]);

  const driveSignIn=useCallback(async(interactive=true)=>{
    setSyncState('syncing');
    setSyncErr(null);
    try{
      await GDRIVE.init();
      await GDRIVE.signIn(interactive);
      setSignedIn(true);
      await syncNow();
    }catch(e){
      console.error('Sign-in error:',e);
      setSyncErr(String(e?.message||e));
      setSyncState('error');
      setSignedIn(false);
    }
  },[syncNow]);

  const driveSignOut=useCallback(()=>{
    GDRIVE.signOut();
    setSignedIn(false);
    setSyncState('idle');
    setSyncErr(null);
    clearTimeout(syncRef.current.pushTimer);
    showToast('Drive desconectado');
  },[]);

  // Init: si el usuario ya estaba logueado, intentar silent sign-in
  useEffect(()=>{
    if(syncRef.current.initDone)return;
    syncRef.current.initDone=true;
    const wasSigned=localStorage.getItem('dc3_drive_signed')==='1';
    if(!wasSigned){setSyncState('idle');return;}
    (async()=>{
      try{
        await GDRIVE.init();
        await GDRIVE.signIn(false);
        setSignedIn(true);
        await syncNow();
      }catch(e){
        // Silent falló — quedarse en idle, usuario reconecta manualmente
        setSyncState('idle');
        setSignedIn(false);
      }
    })();
  },[]);

  // Refresh token al volver al foco/tab
  useEffect(()=>{
    const onVisible=async()=>{
      if(document.visibilityState!=='visible')return;
      if(!signedIn)return;
      if(!GDRIVE.isTokenValid()){
        try{await GDRIVE.ensureToken();}catch(e){setSyncState('error');setSyncErr('Sesión expirada. Reconectá Drive.');setSignedIn(false);return;}
      }
      syncNow();
    };
    document.addEventListener('visibilitychange',onVisible);
    return()=>document.removeEventListener('visibilitychange',onVisible);
  },[signedIn,syncNow]);

  // Online/offline listener
  useEffect(()=>{
    const on=()=>{setIsOnline(true);if(signedIn)syncNow();};
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[signedIn,syncNow]);

  // Schedule push en cada cambio (excepto si es por aplicar remoto)
  useEffect(()=>{
    if(!signedIn)return;
    if(syncRef.current.applyingRemote)return;
    if(syncState==='init')return;
    lsSet('meta_localTs',Date.now());
    schedulePush();
    // eslint-disable-next-line
  },[foods,combos,usage,settings,day,signedIn]);

  const dm=useMemo(()=>dayMacros(day,foods,combos),[day,foods,combos]);

  // Mutators
  const upsertFood=f=>setFoods(p=>({...p,[f.id]:f}));
  const removeFood=id=>setFoods(p=>{const n={...p};delete n[id];return n;});
  const bulkFoods=arr=>setFoods(p=>{const n={...p};arr.forEach(f=>n[f.id]=f);return n;});
  const upsertCombo=c=>setCombos(p=>({...p,[c.id]:c}));
  const removeCombo=id=>setCombos(p=>{const n={...p};delete n[id];return n;});
  const trackUsage=(foodId,amount)=>setUsage(p=>({...p,[foodId]:{count:(p[foodId]?.count||0)+1,lastUsed:Date.now(),lastAmount:amount}}));
  const addMeal=name=>setDay(p=>{const meals=p?.meals||[];return{...p,meals:[...meals,{id:uid(),name:name||suggestMealName(meals.map(m=>m.name)),items:[]}]};});
  const renameMeal=(mid,name)=>setDay(p=>({...p,meals:p.meals.map(m=>m.id===mid?{...m,name}:m)}));
  const removeMeal=mid=>setDay(p=>({...p,meals:p.meals.filter(m=>m.id!==mid)}));
  const addItem=(mid,item)=>{
    setDay(p=>({...p,meals:p.meals.map(m=>m.id===mid?{...m,items:[...m.items,{id:uid(),...item}]}:m)}));
    if(item.kind==='food')trackUsage(item.foodId,item.amount);
  };
  const updateItem=(mid,iid,patch)=>setDay(p=>({...p,meals:p.meals.map(m=>m.id===mid?{...m,items:m.items.map(it=>it.id===iid?{...it,...patch}:it)}:m)}));
  const removeItem=(mid,iid)=>setDay(p=>({...p,meals:p.meals.map(m=>m.id===mid?{...m,items:m.items.filter(it=>it.id!==iid)}:m)}));

  const doBackup=async()=>{
    // Collect all days from localStorage
    const days={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith(LS+'day:')){
        const dateKey=k.replace(LS+'day:','');
        days[dateKey]=JSON.parse(localStorage.getItem(k));
      }
    }
    const str=encodeBackup(foods,combos,days);
    try{await navigator.clipboard.writeText(str);showToast('✓ Backup copiado — pegalo en Notas');}
    catch{window.prompt('Guardá este texto en tus Notas:',str);}
  };
  const doRestore=(data)=>{
    setFoods(data.foods||{});
    if(data.combos)setCombos(data.combos);
    if(data.days){Object.entries(data.days).forEach(([d,v])=>lsSet('day:'+d,v));}
    setDay(lsGet('day:'+date,{date,meals:[],notes:'',waterMl:0,weightKg:null,gymDay:false}));
    showToast(`Restaurado: ${Object.keys(data.foods||{}).length} alimentos`);
  };

  const duplicateDay=targetDate=>{
    if(!day?.meals?.length)return;
    const existing=lsGet('day:'+targetDate,{date:targetDate,meals:[],notes:'',waterMl:0});
    const newMeals=day.meals.map(m=>({...m,id:uid(),items:m.items.map(it=>({...it,id:uid()}))}));
    const merged={...existing,meals:[...existing.meals,...newMeals]};
    lsSet('day:'+targetDate,merged);
    showToast('Comidas copiadas a '+fmtShort(targetDate));
  };

  return (
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <header style={{borderBottom:'1px solid var(--line)',padding:'12px 20px',background:'var(--paper2)',position:'sticky',top:0,zIndex:20,backdropFilter:'blur(8px)'}}>
        <div style={{maxWidth:900,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'baseline',gap:6}}>
            <span className="display" style={{fontSize:22,fontWeight:600,letterSpacing:'-0.02em'}}>Diario<span style={{color:'var(--accent)'}}>·</span>cocina</span>
          </div>
          <nav style={{display:'flex',gap:2,flexWrap:'wrap'}}>
            {[['today','Hoy',<IHome s={13}/>],['week','Semana',<ICal s={13}/>],['foods','Alimentos',<IBook s={13}/>],['combos','Combos',<ILayers s={13}/>]].map(([v,label,icon])=>(
              <button key={v} className={`tab${view===v?' active':''}`} onClick={()=>setView(v)} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:13}}>
                {icon}{label}
              </button>
            ))}
            <button className="tab" title={signedIn?(syncState==='syncing'?'Sincronizando…':syncState==='error'?'Error de sincronización':syncState==='synced'?'Drive sincronizado':!isOnline?'Sin conexión':'Drive'):'Conectar Google Drive'} onClick={()=>setModal({type:'drive'})} style={{padding:'6px 8px',position:'relative'}}>
              <ICloud s={15} style={{color:!signedIn?'var(--muted)':!isOnline?'var(--muted)':syncState==='syncing'?'var(--accent2)':syncState==='error'?'var(--warn)':syncState==='synced'?'var(--accent)':'var(--ink2)'}}/>
              {signedIn&&<span style={{position:'absolute',bottom:4,right:4,width:6,height:6,borderRadius:'50%',background:!isOnline?'var(--muted)':syncState==='syncing'?'var(--accent2)':syncState==='error'?'var(--warn)':syncState==='synced'?'var(--accent)':'var(--muted)'}}/>}
            </button>
            <button className="tab" title="Atajos (?)" onClick={()=>setModal({type:'help'})} style={{padding:'6px 8px',fontWeight:600}}>?</button>
            <button className="tab" onClick={()=>setModal({type:'settings'})} style={{padding:'6px 8px'}}><ISettings s={15}/></button>
          </nav>
        </div>
      </header>

      {/* BACKUP BAR */}
      <BackupBar foods={foods} combos={combos} onBackup={doBackup} onRestore={doRestore}/>

      {/* MAIN */}
      <main style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
        {view==='today'&&<TodayView date={date} setDate={setDate} day={day} setDay={setDay} foods={foods} combos={combos} settings={settings} dm={dm} addMeal={addMeal} renameMeal={renameMeal} removeMeal={removeMeal} addItem={addItem} updateItem={updateItem} removeItem={removeItem} setModal={setModal} showToast={showToast} duplicateDay={duplicateDay}/>}
        {view==='week'&&<WeekView foods={foods} combos={combos} settings={settings} onGoToDate={d=>{setDate(d);setView('today');}}/>}
        {view==='foods'&&<FoodsView foods={foods} combos={combos} usage={usage} onAdd={()=>setModal({type:'foodForm'})} onEdit={f=>setModal({type:'foodForm',food:f})} onRemove={id=>{const u=Object.values(combos).filter(c=>c.items?.some(i=>i.foodId===id));if(u.length&&!window.confirm(`Usado en ${u.length} combo(s). ¿Eliminar?`))return;removeFood(id);showToast('Eliminado');}} onBulk={()=>setModal({type:'bulk'})} onBackup={doBackup} onRestore={doRestore}/>}
        {view==='combos'&&<CombosView combos={combos} foods={foods} onAdd={()=>setModal({type:'comboForm'})} onEdit={c=>setModal({type:'comboForm',combo:c})} onRemove={id=>{removeCombo(id);showToast('Combo eliminado');}}/>}
      </main>

      {/* MODALS */}
      {modal?.type==='addItem'&&<AddItemModal foods={foods} combos={combos} usage={usage} onClose={()=>setModal(null)} onAdd={item=>{addItem(modal.mealId,item);setModal(null);}} onNewFood={()=>setModal({type:'foodForm',returnTo:modal})}/>}
      {modal?.type==='editItem'&&<EditItemModal foods={foods} combos={combos} item={modal.item} onClose={()=>setModal(null)} onSave={patch=>{updateItem(modal.mealId,modal.item.id,patch);setModal(null);}}/>}
      {modal?.type==='foodForm'&&<FoodFormModal food={modal.food} onClose={()=>{if(modal.returnTo)setModal(modal.returnTo);else setModal(null);}} onSave={f=>{upsertFood(f);showToast(modal.food?'Actualizado':'Creado');if(modal.returnTo)setModal(modal.returnTo);else setModal(null);}}/>}
      {modal?.type==='comboForm'&&<ComboFormModal combo={modal.combo} foods={foods} onClose={()=>setModal(null)} onSave={c=>{upsertCombo(c);showToast(modal.combo?'Combo actualizado':'Combo creado');setModal(null);}}/>}
      {modal?.type==='bulk'&&<BulkModal onClose={()=>setModal(null)} onImport={arr=>{bulkFoods(arr);showToast(`${arr.length} alimentos importados`);setModal(null);}}/>}
      {modal?.type==='export'&&<ExportModal day={day} foods={foods} combos={combos} onClose={()=>setModal(null)} showToast={showToast}/>}
      {modal?.type==='settings'&&<SettingsModal settings={settings} onClose={()=>setModal(null)} onSave={s=>{setSettings(s);setModal(null);showToast('Guardado');}}/>}
      {modal?.type==='dupDay'&&<DupDayModal currentDate={date} onClose={()=>setModal(null)} onDup={d=>{duplicateDay(d);setModal(null);}}/>}
      {modal?.type==='help'&&<HelpModal onClose={()=>setModal(null)}/>}
      {modal?.type==='drive'&&<DriveModal onClose={()=>setModal(null)} signedIn={signedIn} syncState={syncState} syncErr={syncErr} lastSyncTs={lastSyncTs} isOnline={isOnline} onSignIn={()=>driveSignIn(true)} onSignOut={driveSignOut} onSyncNow={syncNow}/>}
      {modal?.type==='syncConflict'&&<SyncConflictModal
        remote={modal.remote} remoteTs={modal.remoteTs} localTs={modal.localTs}
        onUseLocal={async()=>{setModal(null);await pushToCloud();}}
        onUseRemote={()=>{applySnapshot(modal.remote);lsSet('meta_lastSyncTs',modal.remoteTs);lsSet('meta_localTs',modal.remoteTs);setLastSyncTs(modal.remoteTs);setSyncState('synced');setModal(null);showToast('Datos de Drive aplicados');}}
        onClose={()=>setModal(null)}
      />}

      {toast&&<Toast msg={toast}/>}
    </div>
  );
}

/* ── BACKUP BAR ── */
function BackupBar({foods,combos,onBackup,onRestore}){
  const[showImport,setShowImport]=useState(false);
  const[importText,setImportText]=useState('');
  const hasFoods=Object.keys(foods).length>0;
  const doImport=()=>{const d=decodeBackup(importText.trim());if(!d){alert('Texto inválido');return;}onRestore(d);setShowImport(false);setImportText('');};
  return(
    <div className="warn-bar">
      <div style={{maxWidth:900,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--warn)',flex:1,display:'flex',alignItems:'center',gap:5}}>
            <IWarn s={13}/> Los datos persisten en este navegador. <strong>Hacé backup</strong> regularmente para no perderlos.
          </span>
          {hasFoods&&<button className="btn btn-xs" style={{borderColor:'rgba(168,67,31,.3)',color:'var(--warn)'}} onClick={onBackup}><ICopy s={11}/> Backup</button>}
          <button className="btn btn-xs" style={{borderColor:'rgba(168,67,31,.3)',color:'var(--warn)'}} onClick={()=>setShowImport(v=>!v)}><IUp s={11}/> Restaurar</button>
        </div>
        {showImport&&(
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <input style={{flex:1,fontSize:12}} placeholder="Pegá tu backup…" value={importText} onChange={e=>setImportText(e.target.value)} autoFocus/>
            <button className="btn btn-primary btn-xs" onClick={doImport} disabled={!importText.trim()}>OK</button>
            <button className="btn btn-ghost btn-xs" onClick={()=>{setShowImport(false);setImportText('');}}>×</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── TODAY VIEW ── */
function TodayView({date,setDate,day,setDay,foods,combos,settings,dm,addMeal,renameMeal,removeMeal,addItem,updateItem,removeItem,setModal,showToast,duplicateDay}){
  const[notesOpen,setNotesOpen]=useState(false);
  const meals=day?.meals||[];
  const waterMl=day?.waterMl||0;
  const weightKg=day?.weightKg??null;
  const gymDay=day?.gymDay||false;

  const copyFromYesterday=()=>{
    const yest=shiftDate(date,-1);
    const yDay=lsGet('day:'+yest,null);
    if(!yDay?.meals?.length){showToast('Sin comidas ayer');return;}
    const newMeals=yDay.meals.map(m=>({...m,id:uid(),items:m.items.map(it=>({...it,id:uid()}))}));
    setDay(p=>({...p,meals:[...(p.meals||[]),...newMeals]}));
    showToast(`${newMeals.length} comidas copiadas`);
  };

  return(
    <div className="fade-in">
      {/* Date nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={()=>setDate(shiftDate(date,-1))}><IChevL/></button>
          <div>
            <div className="display" style={{fontSize:19,fontWeight:600,textTransform:'capitalize',lineHeight:1.1}}>{fmtLong(date)}</div>
            <div className="mono" style={{fontSize:11,color:'var(--muted)'}}>{fmtShort(date)}</div>
          </div>
          <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={()=>setDate(shiftDate(date,1))}><IChevR/></button>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:'auto',fontSize:12,padding:'4px 6px'}}/>
          {date!==todayStr()&&<button className="btn btn-ghost btn-xs" onClick={()=>setDate(todayStr())}>hoy</button>}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button className="btn btn-ghost btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>setNotesOpen(v=>!v)}><INote s={13}/>Nota</button>
          <button className="btn btn-ghost btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4,color:gymDay?'var(--accent)':'',borderColor:gymDay?'var(--accent)':''}} onClick={()=>setDay(p=>({...p,gymDay:!p.gymDay}))}><IGym s={13}/>{gymDay?'Gym ✓':'Gym'}</button>
          <button className="btn btn-ghost btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={copyFromYesterday}><ICopy s={13}/>De ayer</button>
          <button className="btn btn-ghost btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>setModal({type:'dupDay'})} disabled={!meals.length}><ICopy s={13}/>Duplicar</button>
          <button className="btn btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>setModal({type:'export'})} disabled={!meals.length}><IDown s={13}/>Exportar</button>
        </div>
      </div>

      {notesOpen&&(
        <div className="card fade-in" style={{padding:12,marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Notas del día</div>
          <textarea rows={2} placeholder="Ej: Entrené pesado, día de viaje…" value={day?.notes||''} onChange={e=>setDay(p=>({...p,notes:e.target.value}))} style={{resize:'vertical'}}/>
        </div>
      )}

      {/* Totals */}
      <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:12,marginBottom:16}}>
        <DayCard dm={dm} settings={settings}/>
        <WaterCard waterMl={waterMl} goal={settings.waterGoal||2000} onChange={ml=>setDay(p=>({...p,waterMl:Math.max(0,ml)}))}/>
        <WeightCard weightKg={weightKg} onChange={kg=>setDay(p=>({...p,weightKg:kg}))}/>
      </div>

      {/* Meals */}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {meals.length===0&&(
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div className="display" style={{fontSize:17,color:'var(--ink2)'}}>Día en blanco.</div>
            <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>Agregá tu primera colación.</div>
          </div>
        )}
        {meals.map(meal=>(
          <MealCard key={meal.id} meal={meal} date={date} foods={foods} combos={combos}
            onRename={name=>renameMeal(meal.id,name)}
            onRemove={()=>removeMeal(meal.id)}
            onAddItem={()=>setModal({type:'addItem',mealId:meal.id})}
            onEditItem={item=>setModal({type:'editItem',mealId:meal.id,item})}
            onRemoveItem={iid=>removeItem(meal.id,iid)}
            onQuickAdd={item=>addItem(meal.id,item)}
            showToast={showToast}
          />
        ))}
      </div>

      {/* Add meal */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:14}}>
        <button className="btn btn-primary btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>addMeal()}><IPlus s={14}/>Colación</button>
        {['Cena','Desayuno','Almuerzo'].map(n=>(
          <button key={n} className="btn btn-sm" onClick={()=>addMeal(n)}>+ {n}</button>
        ))}
        <button className="btn btn-sm" onClick={()=>{const nm=prompt('Nombre:');if(nm?.trim())addMeal(nm.trim());}}>+ Otra…</button>
      </div>
    </div>
  );

/* ── DAY CARD ── */
function DayCard({dm,settings}){
  const g=settings.goals||{};
  const sg=settings.showGoals;
  const sd=settings.showDist;
  const tot=dm.protein*4+dm.carbs*4+dm.fat*9;
  const pct=v=>tot>0?Math.round(v/tot*100):0;
  return(
    <div className="card" style={{padding:'14px 16px',borderLeft:'3px solid var(--accent)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
        <span style={{fontSize:12,color:'var(--ink2)',fontWeight:500}}>Total del día</span>
        <span className="mono" style={{fontSize:20,fontWeight:600}}>{ni(dm.cal)}<span style={{fontSize:11,color:'var(--muted)',marginLeft:2}}>kcal</span></span>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
        {[['Proteínas',dm.protein,'protein'],['Carbohidr.',dm.carbs,'carbs'],['Grasas',dm.fat,'fat'],['Fibra',dm.fiber,'fiber']].map(([label,val,key])=>(
          <div key={key}>
            <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--muted)'}}>{label}</div>
            <div className="mono" style={{fontSize:15,fontWeight:600,marginTop:2}}>{n(val,1)}<span style={{fontSize:10,color:'var(--muted)',marginLeft:1}}>g</span></div>
            {sg&&g[key]&&(<><div className="prog-track" style={{marginTop:4,width:70}}><div className={`prog-fill${val>g[key]?' prog-over':''}`} style={{width:`${Math.min(100,val/g[key]*100)}%`}}/></div><div className="mono" style={{fontSize:9,color:'var(--muted)',marginTop:1}}>{ni(val)}/{ni(g[key])}</div></>)}
          </div>
        ))}
      </div>
      {sd&&tot>0&&(
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--line)'}}>
          <div style={{display:'flex',height:6,borderRadius:99,overflow:'hidden',gap:1}}>
            <div style={{width:`${pct(dm.protein*4)}%`,background:'#6b8fde',transition:'width .3s'}}/>
            <div style={{width:`${pct(dm.carbs*4)}%`,background:'#d4a83c',transition:'width .3s'}}/>
            <div style={{width:`${pct(dm.fat*9)}%`,background:'#d47a3c',transition:'width .3s'}}/>
          </div>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            {[['#6b8fde',`P ${pct(dm.protein*4)}%`],['#d4a83c',`C ${pct(dm.carbs*4)}%`],['#d47a3c',`G ${pct(dm.fat*9)}%`]].map(([col,label])=>(
              <span key={label} className="mono" style={{fontSize:10,color:'var(--muted)',display:'inline-flex',alignItems:'center',gap:3}}>
                <span style={{width:8,height:8,background:col,borderRadius:2,display:'inline-block'}}/>
                {label}
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── WATER CARD ── */
function WaterCard({waterMl,goal,onChange}){
  const pct=Math.min(100,waterMl/goal*100);
  const r=22,circ=2*Math.PI*r;
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState('');
  const startEdit=()=>{setVal(String(waterMl));setEditing(true);};
  const commit=()=>{const v=parseInt(val);if(!isNaN(v)&&v>=0)onChange(v);setEditing(false);};
  return(
    <div className="card" style={{padding:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',minWidth:84}}>
      <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--muted)',marginBottom:6}}>Agua</div>
      <div style={{position:'relative',width:52,height:52,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width={52} height={52} style={{position:'absolute'}}>
          <circle cx={26} cy={26} r={r} fill="none" stroke="var(--line)" strokeWidth={4}/>
          <circle className="water-ring" cx={26} cy={26} r={r} fill="none" stroke="var(--water)" strokeWidth={4}
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
            style={{transformOrigin:'26px 26px',transition:'stroke-dashoffset .4s'}}/>
        </svg>
        <IDrop s={15} style={{color:'var(--water)'}}/>
      </div>
      {editing?(
        <input
          className="mono"
          type="number"
          style={{width:72,fontSize:12,padding:'2px 4px',marginTop:4,textAlign:'center',color:'var(--water)'}}
          value={val}
          onChange={e=>setVal(e.target.value)}
          onBlur={commit}
          onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setEditing(false);}}
          autoFocus
        />
      ):(
        <div
          className="mono"
          title="Tocá para editar"
          style={{fontSize:13,fontWeight:600,color:'var(--water)',marginTop:4,cursor:'pointer',borderBottom:'1px dashed var(--water)'}}
          onClick={startEdit}
        >{waterMl<1000?`${waterMl}ml`:`${(waterMl/1000).toFixed(1)}L`}</div>
      )}
      <div className="mono" style={{fontSize:10,color:'var(--muted)'}}>{Math.round(waterMl/250)} vasos</div>
      <div style={{display:'flex',gap:4,marginTop:6}}>
        <button className="btn btn-ghost" style={{padding:'3px 8px',fontSize:14}} onClick={()=>onChange(waterMl-250)}>−</button>
        <button className="btn btn-primary" style={{padding:'3px 8px',fontSize:14}} onClick={()=>onChange(waterMl+250)}>+</button>
      </div>
    </div>
  );
}

  const commit=()=>{const v=parseFloat(val.replace(',','.'));onChange(isNaN(v)||v<=0?null:v);setEditing(false);};

    <div className="card" style={{padding:12,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'space-between',minWidth:72}}>

      <IWeight s={20} style={{color:'var(--ink2)',opacity:.6}}/>
      {editing?(
        <input className="mono" type="number" step="0.1"
          style={{width:72,fontSize:12,padding:'2px 4px',marginTop:6,textAlign:'center'}}
          value={val} onChange={e=>setVal(e.target.value)}
          onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setEditing(false);}}
          autoFocus/>

        <div className="mono" title="Tocá para editar"

      <div className="mono" style={{fontSize:9,color:'var(--muted)',marginTop:2,visibility:'hidden'}}>.</div>
    </div>

}


function MealCard({meal,date,foods,combos,onRename,onRemove,onAddItem,onEditItem,onRemoveItem,onQuickAdd,showToast}){
  const[open,setOpen]=useState(true);
  const[editName,setEditName]=useState(false);
  const[nameVal,setNameVal]=useState(meal.name);
  const mm=useMemo(()=>mealMacros(meal,foods,combos),[meal,foods,combos]);
  useEffect(()=>setNameVal(meal.name),[meal.name]);
  const copyMeal=async()=>{
    const rows=[];
    for(const it of meal.items){
      if(it.kind==='combo'){const c=combos[it.comboId];if(!c)continue;const m=comboMacros(c,foods,it.multiplier||1);rows.push([fmtShort(date),meal.name,`[Combo] ${c.name}`,it.multiplier||1,'x',n(m.cal,1),n(m.protein,1),n(m.carbs,1),n(m.fat,1),n(m.fiber,1)]);}
      else{const f=foods[it.foodId];if(!f)continue;const m=itemMacros(it,f);rows.push([fmtShort(date),meal.name,f.name,it.amount,BU[f.basis],n(m.cal,1),n(m.protein,1),n(m.carbs,1),n(m.fat,1),n(m.fiber,1)]);}
    }
    try{await navigator.clipboard.writeText(rows.map(r=>r.join('\t')).join('\n'));showToast('Copiado');}catch{showToast('No se pudo copiar');}
  };
  return(
    <div className="card" style={{overflow:'hidden'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(to bottom,var(--paper),var(--paper2))',borderBottom:'1px solid var(--line)',padding:'10px 12px',display:'flex',alignItems:'center',gap:8}}>
        <button className="btn btn-ghost" style={{padding:'2px 4px'}} onClick={()=>setOpen(v=>!v)}>{open?<IChevD s={15}/>:<IChevR s={15}/>}</button>
        {editName
          ?<input className="display" style={{flex:1,fontSize:14,fontWeight:500,padding:'2px 6px'}} value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={()=>{if(nameVal.trim())onRename(nameVal.trim());setEditName(false);}} onKeyDown={e=>{if(e.key==='Enter')e.target.blur();if(e.key==='Escape'){setNameVal(meal.name);setEditName(false);}}} autoFocus/>
          :<div className="display" style={{flex:1,fontSize:14,fontWeight:500,cursor:'pointer'}} onClick={()=>setEditName(true)}>{meal.name}</div>
        }
        <div className="mono" style={{fontSize:10,color:'var(--muted)',display:'none'}}>{ni(mm.cal)} kcal</div>
        <span className="mono" style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{ni(mm.cal)} kcal · P {n(mm.protein,1)} · C {n(mm.carbs,1)} · G {n(mm.fat,1)}</span>
        <button className="btn btn-ghost" style={{padding:'4px 6px'}} onClick={copyMeal}><ICopy s={13}/></button>
        <button className="btn btn-danger" style={{padding:'4px 6px'}} onClick={onRemove}><ITrash s={13}/></button>
      </div>
      {/* Items */}
      {open&&(
        <div>
          {meal.items.length===0&&<div style={{padding:'10px 14px',fontSize:13,color:'var(--muted)'}}>Vacío.</div>}
          {meal.items.map(item=><ItemRow key={item.id} item={item} foods={foods} combos={combos} onEdit={()=>onEditItem(item)} onRemove={()=>onRemoveItem(item.id)}/>)}
          <QuickAdd foods={foods} onAdd={onQuickAdd} onOpenModal={onAddItem}/>
        </div>
      )}
    </div>
  );
}

/* ── QUICK ADD ── */
function QuickAdd({foods,onAdd,onOpenModal}){
  const[q,setQ]=useState('');
  const[sugg,setSugg]=useState([]);
  const[pending,setPending]=useState(null);
  const[amt,setAmt]=useState('');
  const foodsArr=useMemo(()=>Object.values(foods),[foods]);
  useEffect(()=>{
    const text=q.trim();
    if(!text||pending){setSugg([]);return;}
    const match=text.match(/^(.+?)\s+(\d+(?:[.,]\d+)?)$/);
    const tp=match?match[1]:text;
    const scored=foodsArr.map(f=>({f,s:fuzzy(tp,f.name)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,5);
    setSugg(scored.map(x=>({food:x.f,pre:match?parseFloat(match[2].replace(',','.')):null})));
  },[q,foods,pending]);
  const select=(food,pre)=>{setPending(food);setSugg([]);if(pre)setAmt(String(pre));else setAmt('');};
  const submit=()=>{
    const a=parseFloat(amt.replace(',','.'));
    if(!pending||!a||a<=0)return;
    onAdd({kind:'food',foodId:pending.id,amount:a});
    setPending(null);setAmt('');setQ('');
  };
  return(
    <div style={{padding:'8px 12px',borderTop:'1px solid var(--line)',position:'relative'}}>
      {!pending?(
        <>
          <div style={{display:'flex',gap:6}}>
            <div style={{position:'relative',flex:1}}>
              <IZap s={12} style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',pointerEvents:'none'}}/>
              <input style={{paddingLeft:28,fontSize:13}} placeholder='Agregar rápido: "yogur 150"…' value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Escape')setQ('');if(e.key==='Enter'&&sugg.length)select(sugg[0].food,sugg[0].pre);}}/>
            </div>
            <button className="btn btn-ghost" style={{padding:'4px 10px',flexShrink:0,display:'inline-flex',alignItems:'center',gap:4,fontSize:13}} onClick={onOpenModal}><IPlus s={13}/>Más</button>
          </div>
          {sugg.length>0&&(
            <div className="card" style={{position:'absolute',left:12,right:12,zIndex:10,marginTop:2,overflow:'hidden',boxShadow:'0 8px 24px rgba(0,0,0,.12)'}}>
              {sugg.map(({food,pre},i)=>(
                <button key={food.id} style={{display:'flex',width:'100%',textAlign:'left',padding:'8px 12px',background:'none',border:'none',borderBottom:i<sugg.length-1?'1px solid var(--line)':'none',cursor:'pointer',alignItems:'center',gap:8,fontFamily:'inherit'}} className="row" onClick={()=>select(food,pre)}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{food.name}</div>
                    <div className="mono" style={{fontSize:10,color:'var(--muted)'}}>{ni(food.cal)} kcal {BL[food.basis]}</div>
                  </div>
                  {pre&&<span className="mono" style={{fontSize:12,color:'var(--accent)',flexShrink:0}}>{pre}{BU[food.basis]}</span>}
                </button>
              ))}
            </div>
          )}
        </>
      ):(
        <div className="fade-in" style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><span style={{color:'var(--muted)'}}>+&nbsp;</span>{pending.name}</div>
          <input className="mono" style={{width:90,fontSize:13,padding:'4px 8px'}} placeholder={BU[pending.basis]==='u'?'unidades':'gramos'} value={amt} onChange={e=>setAmt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape'){setPending(null);setAmt('');setQ('');}}} autoFocus/>
          <span className="mono" style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>{BU[pending.basis]}</span>
          {amt&&(()=>{const a=parseFloat(amt.replace(',','.'));if(!a)return null;const m=itemMacros({amount:a},pending);return<span className="mono" style={{fontSize:11,color:'var(--accent2)',flexShrink:0}}>{ni(m.cal)}kcal</span>;})()}
          <button className="btn btn-primary btn-xs" onClick={submit}>+</button>
          <button className="btn btn-ghost btn-xs" onClick={()=>{setPending(null);setAmt('');setQ('');}}>×</button>
        </div>
      )}
    </div>
  );
}

/* ── ITEM ROW ── */
function ItemRow({item,foods,combos,onEdit,onRemove}){
  let name,amtText,mm,isCombo=false,missing=false;
  if(item.kind==='combo'){
    isCombo=true;const c=combos[item.comboId];
    if(!c){missing=true;name='[combo eliminado]';amtText='';mm={cal:0,protein:0,carbs:0,fat:0,fiber:0};}
    else{name=c.name;amtText=`×${item.multiplier||1}`;mm=comboMacros(c,foods,item.multiplier||1);}
  }else{
    const f=foods[item.foodId];
    if(!f){missing=true;name='[alimento eliminado]';amtText='';mm={cal:0,protein:0,carbs:0,fat:0,fiber:0};}
    else{name=f.name;amtText=`${n(item.amount,item.amount%1===0?0:1)}${BU[f.basis]==='u'?' ':''}${BU[f.basis]}`;mm=itemMacros(item,f);}
  }
  return(
    <div className="row hs-parent" style={{borderTop:'1px solid var(--line)',padding:'8px 12px',display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={onEdit}>
      <div style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        {isCombo&&<span className="pill" style={{fontSize:10}}><ILayers s={9}/>combo</span>}
        {missing&&<span className="pill pill-warn" style={{fontSize:10}}>faltante</span>}
        <span style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontStyle:missing?'italic':'normal',color:missing?'var(--muted)':'var(--ink)'}}>{name}</span>
      </div>
      <span className="mono" style={{fontSize:11,color:'var(--ink2)',flexShrink:0}}>{amtText}</span>
      <span className="mono" style={{fontSize:12,flexShrink:0}}>{ni(mm.cal)}<span style={{color:'var(--muted)',fontSize:10}}> kcal</span></span>
      <span className="mono" style={{fontSize:10,color:'var(--muted)',flexShrink:0,display:'none'}}>P {n(mm.protein,1)} C {n(mm.carbs,1)} G {n(mm.fat,1)}</span>
      <div className="hs" style={{display:'flex',gap:2,flexShrink:0}}>
        <button className="btn btn-ghost" style={{padding:'3px 5px'}} onClick={e=>{e.stopPropagation();onEdit();}}><IEdit s={11}/></button>
        <button className="btn btn-danger" style={{padding:'3px 5px'}} onClick={e=>{e.stopPropagation();onRemove();}}><IX s={11}/></button>
      </div>
    </div>
  );
}

/* ── WEEK VIEW ── */
function WeekView({foods,combos,settings,onGoToDate}){
  const[offset,setOffset]=useState(0);
  const rows=useMemo(()=>{
    const arr=[];
    for(let i=6;i>=0;i--){const d=shiftDate(todayStr(),offset-i);const day=lsGet('day:'+d,null);arr.push({date:d,dm:dayMacros(day,foods,combos),waterMl:day?.waterMl||0,notes:day?.notes||'',gymDay:day?.gymDay||false,weightKg:day?.weightKg??null,empty:!day?.meals?.length});}
    return arr;
  },[offset,foods,combos]);
  const prevWeekAvgWeight=useMemo(()=>{
    const ws=[];
    for(let i=13;i>=7;i--){const d=shiftDate(todayStr(),offset-i);const day=lsGet('day:'+d,null);if(day?.weightKg!=null)ws.push(day.weightKg);}
    return ws.length?ws.reduce((a,b)=>a+b,0)/ws.length:null;
  },[offset]);
  const filled=rows.filter(r=>!r.empty);
  const avg=filled.length?{cal:filled.reduce((a,r)=>a+r.dm.cal,0)/filled.length,protein:filled.reduce((a,r)=>a+r.dm.protein,0)/filled.length,carbs:filled.reduce((a,r)=>a+r.dm.carbs,0)/filled.length,fat:filled.reduce((a,r)=>a+r.dm.fat,0)/filled.length,fiber:filled.reduce((a,r)=>a+r.dm.fiber,0)/filled.length}:null;
  const maxCal=Math.max(...rows.map(r=>r.dm.cal),1);
  const gc=settings.goals?.cal;
  const weightRows=rows.filter(r=>r.weightKg!=null);
  const maxW=weightRows.length?Math.max(...weightRows.map(r=>r.weightKg)):0;
  const minW=weightRows.length?Math.min(...weightRows.map(r=>r.weightKg)):0;
  const wRange=maxW-minW||1;
  const avgWeight=weightRows.length?(weightRows.reduce((a,r)=>a+r.weightKg,0)/weightRows.length):null;
  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div><div className="display" style={{fontSize:20,fontWeight:600}}>Resumen semanal</div><div style={{fontSize:12,color:'var(--muted)'}}>{filled.length} de 7 días registrados</div></div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ghost btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>setOffset(o=>o-7)}><IChevL s={14}/>Anterior</button>
          {offset<0&&<button className="btn btn-ghost btn-sm" onClick={()=>setOffset(0)}>Esta semana</button>}
          {offset<0&&<button className="btn btn-ghost btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={()=>setOffset(o=>o+7)}>Siguiente<IChevR s={14}/></button>}
        </div>
      </div>
      <div className="card" style={{padding:16,marginBottom:12}}>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Calorías por día</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6,height:80}}>
          {rows.map(({date,dm,empty,gymDay})=>{
            const pct=maxCal>0?dm.cal/maxCal*100:0;
            const isToday=date===todayStr();
            const over=gc&&dm.cal>gc;
            return(
              <div key={date} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer'}} onClick={()=>onGoToDate(date)}>
                <div className="mono" style={{fontSize:9,color:'var(--muted)'}}>{empty?'':ni(dm.cal)}</div>
                <div style={{width:'100%',display:'flex',alignItems:'flex-end',height:52}}>
                  <div style={{width:'100%',borderRadius:'3px 3px 0 0',height:`${Math.max(pct,empty?2:4)}%`,minHeight:3,background:over?'var(--warn)':isToday?'var(--accent)':'var(--line2)',transition:'height .3s'}}/>
                </div>
                <div className="mono" style={{fontSize:9,color:isToday?'var(--accent)':'var(--muted)',fontWeight:isToday?600:400}}>{date.slice(8)}/{date.slice(5,7)}</div>
                {gymDay&&<div style={{fontSize:10}}>💪</div>}
              </div>
            );
          })}
        </div>
        {gc&&<div className="mono" style={{fontSize:10,color:'var(--muted)',marginTop:6}}>Objetivo: {ni(gc)} kcal/día</div>}
      </div>
      {weightRows.length>0&&(
        <div className="card" style={{padding:16,marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:6}}>
            <div style={{fontSize:11,color:'var(--muted)'}}>Peso corporal</div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              {prevWeekAvgWeight&&avgWeight&&(()=>{const d=avgWeight-prevWeekAvgWeight;const sign=d>0?'+':'';const col=d<0?'var(--accent2)':d>0?'var(--warn)':'var(--muted)';return<div className="mono" style={{fontSize:11,color:col}}>{sign}{d.toFixed(2)} kg vs sem. ant.</div>;})()}
              {avgWeight&&<div className="mono" style={{fontSize:11,color:'var(--ink2)'}}>{avgWeight.toFixed(1)} kg prom.</div>}
            </div>
          </div>
          <div style={{position:'relative',display:'flex',alignItems:'flex-end',gap:6,height:60}}>
            {(()=>{const wg=settings.weightGoal;if(!wg)return null;const lo=Math.min(minW,wg),hi=Math.max(maxW,wg);const range=hi-lo||1;const goalPct=((wg-lo)/range)*70+10;return<div title={`Objetivo: ${wg} kg`} style={{position:'absolute',left:0,right:0,bottom:`${goalPct*0.4+15}px`,height:0,borderTop:'1px dashed var(--accent)',pointerEvents:'none',zIndex:1}}><span className="mono" style={{position:'absolute',right:0,top:-12,fontSize:9,color:'var(--accent)',background:'var(--bg)',padding:'0 3px'}}>{wg}kg</span></div>;})()}
            {rows.map(({date,weightKg})=>{
              const isToday=date===todayStr();
              const wg=settings.weightGoal;
              const lo=wg?Math.min(minW,wg):minW;
              const hi=wg?Math.max(maxW,wg):maxW;
              const range=hi-lo||1;
              const pct=weightKg!=null?((weightKg-lo)/range*70+10):0;
              return(
                <div key={date} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',position:'relative',zIndex:2}} onClick={()=>onGoToDate(date)}>
                  {weightKg!=null&&<div className="mono" style={{fontSize:9,color:'var(--muted)'}}>{weightKg}</div>}
                  <div style={{width:'100%',display:'flex',alignItems:'flex-end',height:40}}>
                    <div style={{width:'100%',borderRadius:'3px 3px 0 0',height:weightKg!=null?`${pct}%`:'3px',minHeight:3,background:weightKg!=null?(isToday?'var(--accent2)':'var(--line2)'):'var(--line)',opacity:weightKg!=null?1:.25,transition:'height .3s'}}/>
                  </div>
                  <div className="mono" style={{fontSize:9,color:isToday?'var(--accent)':'var(--muted)',fontWeight:isToday?600:400}}>{date.slice(8)}/{date.slice(5,7)}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <div className="card" style={{overflow:'hidden'}}>
        <div className="grid-week" style={{padding:'8px 14px',borderBottom:'1px solid var(--line)'}}>
          <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Fecha</div>
          {['kcal','P','C','G','Fibra'].map(l=><div key={l} className="mono" style={{fontSize:10,color:'var(--muted)',textAlign:'right'}}>{l}</div>)}
          <div className="mono" style={{fontSize:10,color:'var(--muted)',textAlign:'right'}}>Agua</div>
          <div className="mono" style={{fontSize:10,color:'var(--muted)',textAlign:'right'}}>Peso</div>
        </div>
        {rows.map(({date,dm,waterMl,notes,empty,gymDay,weightKg})=>(
          <div key={date} className="row grid-week" style={{padding:'9px 14px',borderBottom:'1px solid var(--line)',opacity:empty?.45:1,cursor:'pointer'}} onClick={()=>onGoToDate(date)}>
            <div>
              <div style={{fontSize:12,fontWeight:500,color:date===todayStr()?'var(--accent)':'var(--ink)',display:'flex',alignItems:'center',gap:4}}>{fmtShort(date)}{gymDay&&<span style={{fontSize:11}}>💪</span>}</div>
              {notes&&<div style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{notes}</div>}
            </div>
            <div className="mono" style={{textAlign:'right',fontWeight:500}}>{empty?'—':ni(dm.cal)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{empty?'—':n(dm.protein,1)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{empty?'—':n(dm.carbs,1)}</div>
            <div className="col-fat mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{empty?'—':n(dm.fat,1)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{empty?'—':n(dm.fiber,1)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--water)'}}>{waterMl?(waterMl<1000?waterMl+'ml':(waterMl/1000).toFixed(1)+'L'):'—'}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{weightKg!=null?`${weightKg}kg`:'—'}</div>
          </div>
        ))}
        {avg&&(
          <div className="grid-week" style={{padding:'9px 14px',background:'rgba(91,107,58,.06)',borderTop:'1px solid var(--line)'}}>
            <div style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>Promedio</div>
            <div className="mono" style={{textAlign:'right',fontWeight:600}}>{ni(avg.cal)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12}}>{n(avg.protein,1)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12}}>{n(avg.carbs,1)}</div>
            <div className="col-fat mono" style={{textAlign:'right',fontSize:12}}>{n(avg.fat,1)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12}}>{n(avg.fiber,1)}</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--muted)'}}>—</div>
            <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{avgWeight?`${avgWeight.toFixed(1)}kg`:'—'}</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── FOODS VIEW ── */
function FoodsView({foods,combos,usage,onAdd,onEdit,onRemove,onBulk,onBackup,onRestore}){
  const[q,setQ]=useState('');
  const[showImport,setShowImport]=useState(false);
  const[importText,setImportText]=useState('');
  const[sortBy,setSortBy]=useState(null); // null | 'name'|'cal'|'protein'|'carbs'|'fat'|'fiber'
  const[sortDir,setSortDir]=useState('asc');
  const[selected,setSelected]=useState(new Set());
  const arr=useMemo(()=>Object.values(foods),[foods]);

  const sorted=useMemo(()=>{
    let base;
    if(!q.trim())base=[...arr].sort((a,b)=>{const ua=usage[a.id]?.lastUsed||0,ub=usage[b.id]?.lastUsed||0;return ub-ua||a.name.localeCompare(b.name,'es');});
    else base=arr.map(f=>({f,s:fuzzy(q,f.name)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.f);
    if(!sortBy)return base;
    return[...base].sort((a,b)=>{
      const va=sortBy==='name'?a.name:(a[sortBy]||0);
      const vb=sortBy==='name'?b.name:(b[sortBy]||0);
      if(sortBy==='name')return sortDir==='asc'?va.localeCompare(vb,'es'):vb.localeCompare(va,'es');
      return sortDir==='asc'?va-vb:vb-va;
    });
  },[arr,usage,q,sortBy,sortDir]);

  const toggleSort=key=>{if(sortBy===key)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortBy(key);setSortDir('asc');}};
  const SortHdr=({label,k,right=true})=>{
    const active=sortBy===k;
    return(
      <div className="mono" style={{fontSize:10,color:active?'var(--accent2)':'var(--muted)',textAlign:right?'right':'left',cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',justifyContent:right?'flex-end':'flex-start',gap:2}} onClick={()=>toggleSort(k)}>
        {label}{active?(sortDir==='asc'?'▲':'▼'):''}
      </div>
    );
  };

  const allVisible=sorted.map(f=>f.id);
  const allChecked=allVisible.length>0&&allVisible.every(id=>selected.has(id));
  const[confirmDel,setConfirmDel]=useState(false);
  const deleteSelected=()=>{
    if(!selected.size)return;
    if(!confirmDel){setConfirmDel(true);setTimeout(()=>setConfirmDel(false),3000);return;}
    Array.from(selected).forEach(id=>onRemove(id));
    setSelected(new Set());
    setConfirmDel(false);
  };
  const toggleAll=()=>{if(allChecked)setSelected(new Set());else setSelected(new Set(allVisible));};
  const toggleOne=id=>setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});

  const doImport=()=>{const d=decodeBackup(importText.trim());if(!d){alert('Texto inválido');return;}onRestore(d);setShowImport(false);setImportText('');};
  return(
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <div><div className="display" style={{fontSize:20,fontWeight:600}}>Base de alimentos</div><div style={{fontSize:12,color:'var(--muted)'}}>{arr.length} alimentos</div></div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{position:'relative'}}>
            <ISearch s={13} style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',pointerEvents:'none'}}/>
            <input style={{paddingLeft:28,width:150,fontSize:13,padding:'6px 10px 6px 28px'}} placeholder="Buscar…" value={q} onChange={e=>{setQ(e.target.value);setSelected(new Set());}}/>
          </div>
          {selected.size>0&&(
            <button className="btn btn-xs" style={{display:'inline-flex',alignItems:'center',gap:3,color: confirmDel?'#fff':'var(--warn)',background:confirmDel?'var(--warn)':undefined,borderColor:'var(--warn)'}} onClick={deleteSelected}><ITrash s={11}/>{confirmDel?`¿Confirmar? (${selected.size})`:`Borrar ${selected.size}`}</button>
          )}
          <button className="btn btn-xs" style={{display:'inline-flex',alignItems:'center',gap:3}} onClick={onBackup}><IDown s={11}/>Backup</button>
          <button className="btn btn-xs" style={{display:'inline-flex',alignItems:'center',gap:3}} onClick={()=>setShowImport(v=>!v)}><IUp s={11}/>Restaurar</button>
          <button className="btn btn-xs" style={{display:'inline-flex',alignItems:'center',gap:3}} onClick={onBulk}><ICopy s={11}/>Masivo</button>
          <button className="btn btn-primary btn-sm" style={{display:'inline-flex',alignItems:'center',gap:4}} onClick={onAdd}><IPlus s={14}/>Nuevo</button>
        </div>
      </div>
      {showImport&&(
        <div className="card fade-in" style={{padding:12,marginBottom:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <input style={{flex:1,fontSize:12}} placeholder="Pegá tu backup de texto…" value={importText} onChange={e=>setImportText(e.target.value)} autoFocus/>
          <button className="btn btn-primary btn-xs" onClick={doImport} disabled={!importText.trim()}>Restaurar</button>
          <button className="btn btn-ghost btn-xs" onClick={()=>{setShowImport(false);setImportText('');}}>×</button>
        </div>
      )}
      {arr.length===0?(
        <div className="card" style={{padding:40,textAlign:'center'}}>
          <div className="display" style={{fontSize:17,color:'var(--ink2)'}}>Sin alimentos.</div>
          <div style={{fontSize:13,color:'var(--muted)',marginTop:4,marginBottom:16}}>Creá tu primer alimento o usá la carga masiva.</div>
          <div style={{display:'flex',gap:8,justifyContent:'center'}}>
            <button className="btn btn-primary" onClick={onAdd}>Crear alimento</button>
            <button className="btn" onClick={onBulk}>Carga masiva</button>
          </div>
        </div>
      ):(
        <div className="card" style={{overflow:'hidden'}}>
          <div className="grid-foods" style={{padding:'7px 14px',borderBottom:'1px solid var(--line)'}}>
            <input type="checkbox" style={{cursor:'pointer'}} checked={allChecked} onChange={toggleAll}/>
            <SortHdr label="Nombre" k="name" right={false}/>
            {[['kcal','cal'],['P','protein'],['C','carbs'],['G','fat'],['Fib','fiber']].map(([l,k])=><SortHdr key={k} label={l} k={k}/>)}
            <div className="mono" style={{fontSize:10,color:'var(--muted)',textAlign:'right'}}>Base</div>
          </div>
          {sorted.map(f=>(
            <div key={f.id} className="row hs-parent grid-foods" style={{padding:'8px 14px',borderBottom:'1px solid var(--line)',cursor:'pointer',background:selected.has(f.id)?'rgba(91,107,58,.06)':undefined}} onClick={()=>onEdit(f)}>
              <input type="checkbox" style={{cursor:'pointer'}} checked={selected.has(f.id)} onChange={e=>{e.stopPropagation();toggleOne(f.id);}} onClick={e=>e.stopPropagation()}/>
              <div style={{minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                  {f.rawCooked&&<span className="pill pill-gold" style={{fontSize:10}}>{f.rawCooked}</span>}
                </div>
                {f.notes&&<div style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.notes}</div>}
              </div>
              <div className="mono" style={{textAlign:'right',fontSize:13}}>{ni(f.cal)}</div>
              <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{n(f.protein,1)}</div>
              <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{n(f.carbs,1)}</div>
              <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{n(f.fat,1)}</div>
              <div className="mono" style={{textAlign:'right',fontSize:12,color:'var(--ink2)'}}>{n(f.fiber,1)}</div>
              <div style={{textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}}>
                <span style={{fontSize:10,color:'var(--muted)'}}>{BL[f.basis].replace('por ','')}</span>
                <button className="btn btn-danger hs" style={{padding:'2px 4px'}} onClick={e=>{e.stopPropagation();onRemove(f.id);}}><ITrash s={11}/></button>
              </div>
            </div>
          ))}
          {sorted.length===0&&<div style={{padding:'20px 14px',textAlign:'center',fontSize:13,color:'var(--muted)'}}>Sin resultados.</div>}
        </div>
      )}
    </div>
  );
}

/* ── COMBOS VIEW ── */

        <div style={{display:'flex',gap:6,alignItems:'center'}}>

            <div key={c.id} className="card hs-parent" style={{padding:14,cursor:'pointer'}} onClick={()=>onEdit(c)}>

              </div>

            </div>
          );})}
        </div>
      )}

  );
}

/* ── ADD ITEM MODAL ── */

    if(tab==='food'){if(!sel)return;const raw=parseFloat(amt.replace(',','.'));if(!raw||raw<=0)return;const finalAmt=(canSwitch&&mode==='grams')?raw/sel.weightPerUnit:raw;onAdd({kind:'food',foodId:sel.id,amount:finalAmt});}

            <>

                <input style={{paddingLeft:28}} placeholder={tab==='food'?'Buscar alimento…':'Buscar combo…'} value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
              </div>
              <div style={{maxHeight:260,overflowY:'auto',borderTop:'1px solid var(--line)'}}>
                {tab==='food'&&(

                    {foodsArr.map(f=>(
                      <button key={f.id} style={{display:'flex',width:'100%',textAlign:'left',padding:'9px 12px',background:'none',border:'none',borderBottom:'1px solid var(--line)',cursor:'pointer',alignItems:'center',fontFamily:'inherit'}} className="row" onClick={()=>selectFood(f)}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
                          <div className="mono" style={{fontSize:10,color:'var(--muted)'}}>{ni(f.cal)} kcal {BL[f.basis]}{usage[f.id]?.lastAmount?` · último: ${usage[f.id].lastAmount}${BU[f.basis]}`:''}</div>
                        </div>
                      </button>
                    ))}
                    <button style={{display:'flex',width:'100%',padding:'10px 12px',background:'none',border:'none',borderTop:'1px solid var(--line)',cursor:'pointer',alignItems:'center',gap:6,fontSize:13,fontFamily:'inherit',color:'var(--accent)'}} onClick={onNewFood}><IPlus s={13}/>Crear alimento nuevo</button>
                  </>

                {tab==='combo'&&(

                    {combosArr.map(c=>{const mm=comboMacros(c,foods,1);return<button key={c.id} style={{display:'flex',width:'100%',textAlign:'left',padding:'9px 12px',background:'none',border:'none',borderBottom:'1px solid var(--line)',cursor:'pointer',fontFamily:'inherit'}} className="row" onClick={()=>{setSel(c);setMult('1');}}><div style={{flex:1}}><div style={{fontSize:13}}>{c.name}</div><div className="mono" style={{fontSize:10,color:'var(--muted)'}}>{c.items.length} ítems · {ni(mm.cal)} kcal</div></div></button>;})}

              <label style={{fontSize:12,color:'var(--muted)'}}>

              {(()=>{const mm=previewMacros();if(!mm)return null;const raw=parseFloat(amt.replace(',','.'))||0;let eq=null;if(canSwitch&&raw>0)eq=mode==='units'?`= ${n(raw*sel.weightPerUnit,1)}g`:`= ${n(raw/sel.weightPerUnit,2)}u`;return<div className="mono" style={{fontSize:12,marginTop:8,padding:'8px 12px',borderRadius:5,background:'rgba(91,107,58,.08)',color:'var(--accent2)'}}>{eq&&<span style={{color:'var(--muted)',marginRight:8}}>{eq} ·</span>}{ni(mm.cal)} kcal · P {n(mm.protein,1)} · C {n(mm.carbs,1)} · G {n(mm.fat,1)} · F {n(mm.fiber,1)}</div>;})()}
            </div>

              {(()=>{const m=parseFloat(mult.replace(',','.'))||0;const mm=comboMacros(sel,foods,m);return<div className="mono" style={{fontSize:12,marginTop:8,padding:'8px 12px',borderRadius:5,background:'rgba(91,107,58,.08)',color:'var(--accent2)'}}>{ni(mm.cal)} kcal · P {n(mm.protein,1)} · C {n(mm.carbs,1)} · G {n(mm.fat,1)}</div>;})()}

  );
}

/* ── EDIT ITEM MODAL ── */
function EditItemModal({foods,combos,item,onClose,onSave}){
  const isCombo=item.kind==='combo';
  const food=!isCombo?foods[item.foodId]:null;
  const combo=isCombo?combos[item.comboId]:null;
  const canSwitch=!isCombo&&food?.basis==='per_unit'&&food?.weightPerUnit;
  const[mode,setMode]=useState('units');
  const[amt,setAmt]=useState(isCombo?String(item.multiplier||1):String(item.amount));
  const submit=()=>{const v=parseFloat(amt.replace(',','.'));if(!v||v<=0)return;if(isCombo){onSave({multiplier:v});return;}const fa=(canSwitch&&mode==='grams')?v/food.weightPerUnit:v;onSave({amount:fa});};
  const previewU=()=>{const v=parseFloat(amt.replace(',','.'))||0;return(canSwitch&&mode==='grams')?v/food.weightPerUnit:v;};
  const mm=isCombo?comboMacros(combo||{items:[]},foods,parseFloat(amt.replace(',','.'))||0):itemMacros({amount:previewU()},food||{});

  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>

          <div className="display" style={{fontSize:17,fontWeight:600}}>Editar cantidad</div>

        </div>
        <div style={{padding:'14px 18px'}}>
          <div style={{fontWeight:500,marginBottom:2}}>{isCombo?combo.name:food.name}</div>

          {canSwitch&&<div style={{display:'flex',gap:4,marginBottom:8}}><button type="button" className={`btn btn-sm${mode==='units'?' btn-primary':''}`} style={{flex:1}} onClick={()=>{setMode('units');setAmt('');}}>Unidades</button><button type="button" className={`btn btn-sm${mode==='grams'?' btn-primary':''}`} style={{flex:1}} onClick={()=>{setMode('grams');setAmt('');}}>Gramos</button></div>}
          <label style={{fontSize:12,color:'var(--muted)'}}>{isCombo?'Multiplicador':canSwitch&&mode==='grams'?`Cantidad (g) — 1u = ${food.weightPerUnit}g`:food?.basis==='per_unit'?'Cantidad (unidades)':`Cantidad (${BU[food.basis]})`}</label>
